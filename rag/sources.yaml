schema_version: 2
workspace_root: .

index:
  embedding_model: BAAI/bge-m3
  collections:
    default: netsuite_knowledge

sources:
  - source_name: obsidian
    source_kind: note
    root: .
    include:
      - projects
      - knowledge
    exclude:
      - .git
      - .obsidian
      - .superpowers
      - .rag-index
    file_types:
      - md
    parser: markdown_frontmatter_h2
    collection: netsuite_knowledge
    authority: curated_note_source
