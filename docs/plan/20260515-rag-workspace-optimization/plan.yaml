    description: |
      Upgrade incremental indexing to use file_hash instead of just mtime:
      1. Fast check: compare mtime + size first; if unchanged, skip
      2. Slow check: if mtime or size changed, compute file_hash and compare to manifest
      3. If hash unchanged (false positive mtime change), skip re-indexing
      4. If hash changed, delete old chunks + re-parse + re-chunk + upsert
      5. Detect deleted files: compare manifest keys vs scanned files; remove orphaned chunks
      6. Use manifest.py helpers for read/write/migrate
      7. Return detailed per-file statistics (changed, unchanged, deleted, errors)
