plan_id: "20260515-rag-workspace-optimization"
objective: "Implement dual-source indexing (Obsidian notes + NetSuite code repos) with unified metadata, SuiteScript parsing, routing, and conflict resolution for the NetSuite RAG MCP system"
created_at: "2026-05-15"
created_by: gem-planner
status: mostly_complete
research_confidence: high
plan_metrics:
  wave_1_task_count: 1
  wave_2_task_count: 4
  wave_3_task_count: 2
  wave_4_task_count: 3
  wave_5_task_count: 3
  wave_6_task_count: 3
  wave_7_task_count: 3
  total_dependencies: 18
  risk_score: medium
tldr: |
  Progressive migration from single-source note RAG to dual-source (note + code) RAG:
  - Wave 1: Data model foundation (SourceConfig, extended fields)
  - Wave 2: Config migration, metadata serialization, code parsers (parallel)
  - Wave 3: Code chunker and manifest upgrade
  - Wave 4: Multi-source indexer with hash-based incremental indexing
  - Wave 5: Enhanced retrieval, citations, and MCP tool filters
  - Wave 6: Routing strategy and conflict resolution
  - Wave 7: Integration tests, security scan, and documentation
open_questions:
  - question: "Should we use single collection with source_kind filtering or separate notes/code collections?"
    context: "Design doc allows either approach; single collection is simpler but separate collections enable lifecycle isolation"
    type: decision_blocker
    affects: ["T08", "T11"]
    resolved: "Decided: single collection + source_kind filtering. Simpler implementation, can split later if needed."
  - question: "Should the git integration use subprocess git calls or a Python library like gitpython?"
    context: "subprocess is simpler with no dependency; gitpython offers richer API but adds a dependency"
    type: nice_to_know
    affects: ["T10"]
    resolved: "Decided: subprocess git. No extra dependency, simpler implementation."
  - question: "What is the minimum viable routing heuristic — keyword-based or embedding-based?"
    context: "Keyword-based (scan question for code/question patterns) is faster to implement; embedding-based requires a classifier"
    type: nice_to_know
    affects: ["T14"]
    resolved: "Decided: keyword-based heuristic. Can upgrade to ML-based classifier later."
gaps:
  - description: "SuiteScript parser needs real-world test files to validate @NScriptType and define() extraction"
    refinement_requests:
      - query: "Find or create sample SuiteScript files with various script types"
        source_hint: "tests/ or fixtures directory"
  - description: "XML/JSON config chunking strategy needs validation against real NetSuite customization files"
    refinement_requests:
      - query: "Find NetSuite XML customizations and JSON manifest examples"
        source_hint: "NetSuite documentation or sample repos"
pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: "Backward compatibility break — old sources.yaml format fails to load after config refactor"
      likelihood: medium
      impact: high
      mitigation: "T03 includes explicit auto-migration test; config.py must detect v1 schema and convert before validation"
    - scenario: "SuiteScript parser fails on real-world files with unusual patterns"
      likelihood: medium
      impact: medium
      mitigation: "T04 includes fallback chunking — if structured parsing fails, chunk by line count with preserved line ranges"
    - scenario: "Manifest migration loses existing indexed data"
      likelihood: low
      impact: critical
      mitigation: "T07 requires migration script that preserves existing manifest entries; full mode rebuilds from scratch as safety net"
    - scenario: "Hash-based incremental indexing is too slow on large code repos"
      likelihood: low
      impact: medium
      mitigation: "T09 uses mtime+size fast check first, only computing file_hash for candidate changed files"
    - scenario: "Routing heuristic misclassifies queries, returning wrong source priorities"
      likelihood: medium
      impact: medium
      mitigation: "T14 starts with conservative mixed routing; note-led and code-led only triggered by explicit filter params"
  assumptions:
    - "ChromaDB supports all new metadata fields without schema changes (verified: ChromaDB is schemaless)"
    - "Existing vector store data can be kept during v1→v2 migration by adding new fields with defaults"
    - "Python tree-sitter or regex parsing is sufficient for SuiteScript (no need for full AST)"
    - "git commands available on host system for commit/dirty detection"
    - "Single collection approach initially; may split later if lifecycle isolation needed"
implementation_specification:
  code_structure: |
    src/netsuite_rag_mcp/
      config.py          → multi-source config parsing with v1→v2 auto-migration
      models.py          → SourceConfig + extended SourceDocument/Chunk/SearchResult
      parser.py          → parse_markdown_file + parse_code_file (SuiteScript/JS)
      parser_xml_json.py → NEW: XML/JSON config file parser
      chunker.py         → chunk_document (note) + chunk_code_document (function/class)
      chunker_xml_json.py → NEW: XML/JSON config chunker
      metadata.py        → extended serialization for new fields
      indexer.py         → multi-source routing, hash-based incremental, git info
      retriever.py       → routing strategy, source filtering, conflict resolution
      vector_store.py    → minimal changes (single collection, metadata routing)
      server.py          → extended MCP tool params
      redaction.py       → unchanged
      policy.py          → extended answer policy with routing/conflict rules
      preload.py         → unchanged
      git_utils.py       → NEW: git commit/dirty extraction utility
      manifest.py        → NEW: manifest management (extracted from indexer)
  affected_areas:
    - "Core data models (models.py)"
    - "Configuration (sources.yaml, config.py)"
    - "Parsing pipeline (parser.py, parser_xml_json.py)"
    - "Chunking pipeline (chunker.py, chunker_xml_json.py)"
    - "Metadata serialization (metadata.py)"
    - "Indexing orchestration (indexer.py, manifest.py)"
    - "Retrieval and routing (retriever.py)"
    - "MCP tools interface (server.py)"
    - "Test suite (tests/*)"
  component_details:
    - component: "SourceConfig"
      responsibility: "Dataclass representing a single source in sources[] array (name, kind, root, include/exclude, file_types, parser, collection, authority)"
      interfaces: ["config.py load_config()", "indexer.py"]
      dependencies:
        - component: "models.py"
          relationship: "defined in"
      integration_points: ["sources.yaml", "config.py", "indexer.py"]
    - component: "parse_code_file"
      responsibility: "Parse SuiteScript/JS/TS files, extract @NScriptType, define() deps, function boundaries"
      interfaces: ["parser.py parse_code_file()", "indexer.py"]
      dependencies:
        - component: "SourceDocument"
          relationship: "produces"
      integration_points: ["indexer.py", "chunker.py"]
    - component: "chunk_code_document"
      responsibility: "Split parsed code files into function/class-level chunks with line ranges"
      interfaces: ["chunker.py chunk_code_document()", "indexer.py"]
      dependencies:
        - component: "Chunk"
          relationship: "produces"
        - component: "parse_code_file"
          relationship: "depends on output"
      integration_points: ["indexer.py"]
    - component: "MultiSourceIndexer"
      responsibility: "Route files to correct parser/chunker per source config, manage per-source manifest"
      interfaces: ["indexer.py index_all()", "indexer.py index_sources()"]
      dependencies:
        - component: "SourceConfig"
          relationship: "reads"
        - component: "manifest.py"
          relationship: "delegates manifest to"
      integration_points: ["server.py"]
    - component: "RoutingStrategy"
      responsibility: "Classify query as note-led/code-led/mixed, adjust retrieval and merging"
      interfaces: ["retriever.py route_query()", "retriever.py search_with_routing()"]
      dependencies:
        - component: "source_kind metadata"
          relationship: "filters by"
      integration_points: ["server.py ask tool"]
    - component: "ConflictResolver"
      responsibility: "Detect and resolve conflicts between note and code sources"
      interfaces: ["retriever.py resolve_conflicts()"]
      dependencies:
        - component: "RoutingStrategy"
          relationship: "uses routing context"
      integration_points: ["ask_netsuite_rag response"]
