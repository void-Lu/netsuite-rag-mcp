plan_id: "20260514-dual-source-rag-design-export"
objective: "Produce concise design material for an exported document about Obsidian workspace optimization for a NetSuite RAG knowledge base."
focus_area: "Obsidian workspace optimization"
created_at: "2026-05-14"
created_by: "GitHub Copilot researcher"
status: completed
tldr: |
  - Obsidian is the human-knowledge layer: business context, requirements, troubleshooting, decisions, ZenTao URLs, and metadata anchors.
  - Obsidian is not a code mirror: implementation truth should remain in local NetSuite project repositories; notes should store summaries, links, IDs, and decisions.
  - The workspace design centers on `projects/`, `knowledge/`, `templates/`, `_index/`, and `rag/`; current indexing config targets `projects` and `knowledge`.
  - Frontmatter anchors make RAG filtering possible: `project`, `script_type`, `script_id`, `related_records`, `related_script_ids`, `object_type`, `status`, `tags`, and `zentao_urls`.
  - Key risks are note-code drift, sensitive-data leakage, stale status, metadata entropy, and retrieval noise; mitigations are bounded notes, required metadata, redaction, and source-specific filters.
research_metadata:
  methodology: "file_search for AGENTS.md/PRD/plan artifacts, semantic_search for Obsidian/NetSuite patterns, grep_search for frontmatter and workflow terms, read_file for current design docs, templates, config, parser/chunker, retriever, policy, and tests."
  scope: "Concise export material for the Obsidian workspace layer; not an implementation plan and not code changes."
  confidence: high
