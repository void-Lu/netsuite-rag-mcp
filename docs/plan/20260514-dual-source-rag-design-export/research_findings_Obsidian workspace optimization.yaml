        - "src/netsuite_rag_mcp/retriever.py:11-91"
  directory_structure:
    tree: |
      homework/
      ├─ Index.md                         # dashboard and navigation
      ├─ _index/                          # manual/generated navigation pages
      │  ├─ projects.md
      │  ├─ scripts.md
      │  ├─ objects.md
      │  └─ troubleshooting.md
      ├─ projects/
      │  └─ <project>/
      │     ├─ 00-overview.md
      │     ├─ requirements/
      │     ├─ scripts/
      │     │  ├─ restlet/
      │     │  ├─ suitelet/
      │     │  ├─ userevent/
      │     │  ├─ mapreduce/
      │     │  └─ clientscript/
      │     ├─ objects/
      │     │  ├─ savedsearch/
      │     │  ├─ customlist/
      │     │  ├─ customrecord/
      │     │  ├─ workflow/
      │     │  ├─ role/
      │     │  └─ deployment/
      │     ├─ troubleshooting/
      │     └─ decisions/
      ├─ knowledge/
      │  ├─ suitescript-patterns/
      │  ├─ netsuite-object-playbooks/
      │  ├─ common-errors/
      │  └─ integration-patterns/
      ├─ templates/
      └─ rag/
    source_refs:
      - "docs/superpowers/specs/2026-05-13-netsuite-obsidian-rag-design.md:48-78"
      - "rag/sources.yaml:1-4"
  templates_frontmatter_fields:
    common_fields:
      - "type"
      - "project"
      - "author where applicable"
      - "related_records"
      - "related_script_ids where applicable"
      - "status: active|inactive"
      - "tags"
    script_note:
      title_pattern: "# <Script Type> - 脚本名称, e.g. `# RESTlet - 脚本名称`"
      fields:
        type: "script"
        project: "project key"
        author: "developer name"
        script_type: "restlet|suitelet|userevent|mapreduce|clientscript"
        script_id: "customscript_xxx"
        deployment_id: "customdeploy_xxx"
        related_records: "array of NetSuite record/list IDs"
        related_script_ids: "array of linked script IDs"
        status: "active|inactive"
        tags: "[netsuite, suitescript, <script_type>]"
      body_sections:
        - "关联需求 / 禅道 URLs"
        - "用途"
        - "入口参数"
        - "核心逻辑"
        - "代码片段 only if brief and sanitized"
        - "相关配置"
        - "相关脚本"
        - "排坑记录"
      source_refs:
        - "templates/script-note.md:1-30"
        - "user_request"
    object_note:
      title_pattern: "# <Object Type> - <object/search name>"
      fields:
        type: "object"
        project: "project key"
        object_type: "savedsearch|customlist|customrecord|workflow|role|deployment"
        related_records: "array of related records/lists"
        status: "active|inactive"
        tags: "[netsuite, <object_type>]"
      body_sections:
        - "关联需求 / 禅道 URLs"
        - "业务目的"
        - "条件 Filters"
        - "结果 Results"
        - "使用位置"
      source_refs:
        - "templates/object-note.md:1-19"
        - "docs/superpowers/specs/2026-05-13-netsuite-obsidian-rag-design.md:135-171"
    requirement_note:
      fields:
        type: "requirement"
        project: "project key"
        zentao_urls: "array of ZenTao URLs"
        related_records: "array"
        related_script_ids: "array"
        status: "active|inactive"
        tags: "[netsuite, requirement]"
      body_sections:
        - "禅道链接"
        - "业务背景"
        - "验收标准"
        - "相关脚本"
        - "相关 Object"
      source_refs:
        - "templates/requirement-note.md:1-19"
    troubleshooting_note:
      fields:
        type: "troubleshooting"
        project: "project key"
        author: "developer/support owner"
        related_records: "array"
        related_script_ids: "array"
        status: "active|inactive"
        tags: "[netsuite, troubleshooting]"
      body_sections:
        - "现象"
        - "影响范围"
        - "根因"
        - "解决方案"
        - "相关脚本"
        - "相关 Object"
        - "关联需求 / 禅道 URL"
      source_refs:
        - "templates/troubleshooting-note.md:1-26"
    decision_note:
      status: "Design responsibility exists under `projects/<project>/decisions/`; no current `templates/decision-note.md` file was found."
      minimum_fields_for_export_copy:
        type: "decision"
        project: "project key"
        author: "decision owner"
        decision_status: "proposed|accepted|superseded"
        related_records: "array"
        related_script_ids: "array"
        zentao_urls: "array where relevant"
        decision_date: "YYYY-MM-DD"
        tags: "[netsuite, decision]"
      source_refs:
        - "docs/superpowers/specs/2026-05-13-netsuite-obsidian-rag-design.md:52-72"
        - "user_request"
  what_not_to_store:
    - item: "Full codebase copies or bulk implementation mirrors."
      reason: "Creates drift against source repositories and conflicts with the stated Obsidian role."
      source_refs:
        - "user_request"
    - item: "API keys, tokens, passwords, secrets, cookies, Authorization headers, or session IDs."
      reason: "Redaction and policy treat these as sensitive values."
      source_refs:
        - "src/netsuite_rag_mcp/redaction.py:10-15"
        - "src/netsuite_rag_mcp/policy.py:31-35"
    - item: "Raw customer PII or financial identifiers such as phone, email, ID-card, or bank-card data."
      reason: "Redaction patterns explicitly mask these classes."
      source_refs:
        - "src/netsuite_rag_mcp/redaction.py:5-9"
        - "src/netsuite_rag_mcp/policy.py:31-35"
    - item: "Large logs, generated files, build outputs, dependency folders, or vector DB runtime artifacts."
      reason: "Current source config excludes `.git`, `.obsidian`, `.superpowers`, and `.rag-index`; dual-source research also identifies generated/build folders as exclude candidates."
      source_refs:
        - "rag/sources.yaml:5-8"
        - "docs/plan/20260514-dual-source-rag-design-export/research_findings_RAG 工作区优化.yaml:440-470"
    - item: "Automatically scraped NetSuite account data or ZenTao content."
      reason: "The MVP excludes automatic NetSuite reads and automatic ZenTao crawling; store URLs and human summaries instead."
      source_refs:
        - "docs/superpowers/specs/2026-05-13-netsuite-obsidian-rag-design.md:306-316"
  workflow_rules:
    - "Create project facts in `projects/<project>/`; move reusable lessons to `knowledge/` after they apply beyond one project."
    - "Use templates first; keep required frontmatter fields filled before indexing."
    - "Use lowercase enums for `script_type` and `status`; keep `related_records` and `related_script_ids` as arrays."
    - "Use titles that start with the artifact type, such as `# RESTlet - 脚本名称`, so humans and search results can classify notes quickly."
    - "Record ZenTao URLs in `zentao_urls` for requirement notes and in `关联需求` sections for script/object/troubleshooting notes."
    - "Store implementation anchors (`script_id`, `deployment_id`, `object_type`, repo path, line/symbol summary) instead of copying full implementation files."
    - "When fixing an issue, capture symptom, impact, root cause, solution, related scripts/objects, and linked requirement before moving reusable lessons to `knowledge/common-errors/`."
    - "Run/rely on RAG indexing only for curated note paths currently included by `rag/sources.yaml`: `projects` and `knowledge`."
  risks_mitigations:
    - risk: "Notes become a stale code mirror."
      mitigation: "Keep code in repositories; Obsidian stores summaries, IDs, decisions, links, and troubleshooting context."
      source_refs:
        - "user_request"
    - risk: "RAG answers mix unrelated projects or stale inactive artifacts."
      mitigation: "Require `project`, `status`, `script_type`, `object_type`, `related_records`, and `related_script_ids`; use server filters that already support these fields."
      source_refs:
        - "src/netsuite_rag_mcp/server.py:89-108"
    - risk: "Sensitive data leaks through notes or retrieved context."
      mitigation: "Do not store secrets/PII; rely on redaction and answer policy as a second line of defense, not as permission to store raw sensitive data."
      source_refs:
        - "src/netsuite_rag_mcp/redaction.py:5-22"
        - "src/netsuite_rag_mcp/policy.py:31-35"
    - risk: "Metadata entropy reduces retrieval precision."
      mitigation: "Use templates and required-field tests; keep enum values fixed and arrays normalized."
      source_refs:
        - "tests/test_templates.py:7-43"
        - "src/netsuite_rag_mcp/parser.py:43-50"
    - risk: "Important project context is not indexed because it is placed outside configured paths."
      mitigation: "Put retrievable notes under `projects` or `knowledge`, matching current `rag/sources.yaml`."
      source_refs:
        - "rag/sources.yaml:1-4"
    - risk: "Decision rationale is scattered in scripts or chat history."
      mitigation: "Keep decision notes under `projects/<project>/decisions/` with related records/scripts and ZenTao anchors."
      source_refs:
        - "docs/superpowers/specs/2026-05-13-netsuite-obsidian-rag-design.md:52-72"
        - "user_request"
open_questions:
  - question: "Should a dedicated `templates/decision-note.md` be added to match the documented `decisions/` directory?"
    context: "The design and user request include decisions, but the current visible template set contains script, object, requirement, and troubleshooting templates only."
    type: research
    affects:
      - "decision note consistency"
      - "frontmatter validation"
  - question: "Should `_index/` pages be indexed by RAG or remain human navigation only?"
    context: "The design includes `_index/`, while current `rag/sources.yaml` indexes only `projects` and `knowledge`."
    type: nice_to_know
    affects:
      - "retrieval recall"
      - "duplicate index entries"
gaps:
  - area: "decision template"
    description: "No current `templates/decision-note.md` exists even though decisions are part of the designed project structure and user context."
    impact: nice_to_know
    affects:
      - "decision note consistency"
      - "export completeness"
  - area: "configured source directories"
    description: "`rag/sources.yaml` includes `projects` and `knowledge`; the export material depends on placing retrievable notes there."
    impact: nice_to_know
    affects:
      - "index coverage"
      - "retrieval quality"
  - area: "not-code-mirror enforcement"
    description: "The current Obsidian template layer documents code snippets and related configuration but has no automatic guard preventing full code copies into notes."
    impact: research_blocker
    affects:
      - "note-code drift"
      - "sensitive-data exposure"
  - area: "frontmatter enum validation"
    description: "Templates and tests assert field presence, but no schema validation currently enforces enum values such as `script_type` or `status` at note-authoring time."
    impact: nice_to_know
    affects:
      - "metadata consistency"
      - "filter precision"
