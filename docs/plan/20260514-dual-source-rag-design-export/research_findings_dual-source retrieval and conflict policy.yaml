export_document_material:
  query_flow:
    concise_copy: |
      Query flow: the user asks in Copilot; Copilot calls the local RAG MCP ask tool; the retriever classifies the question as note-led, code-led, or mixed; it searches the selected sources with metadata filters; the context builder normalizes snippets into `context_blocks` and a `sources` list; the merge policy resolves note/code roles and conflicts; Copilot answers with inline `[Sx]` citations and a source list.
    steps:
      - "User question in VS Code Copilot."
      - "Copilot calls `ask_netsuite_rag`."
      - "Route by intent and metadata: business/rationale/troubleshooting -> notes; implementation/config/code behavior -> code; mixed -> both."
      - "Retrieve top candidates, apply source/entity/freshness filters, redact returned text."
      - "Merge by entity and fact type, detect conflicts, attach citation IDs."
      - "Generate answer with direct conclusion, evidence, conflicts/staleness, and sources."
    source_refs:
      - "docs/superpowers/specs/2026-05-13-netsuite-obsidian-rag-design.md:231-245"
      - "README.md:14"
      - "src/netsuite_rag_mcp/retriever.py:51-99"
  retrieval_routing:
    concise_copy: |
      Route by the fact being asked for, not only by keyword. Business meaning, rationale, requirements, decisions, and troubleshooting are note-led. Current parameters, deployed IDs, module dependencies, code paths, function behavior, and line-level implementation are code-led. Mixed questions run both routes and keep source roles visible in the answer.
    routes:
      - route: "note_led"
        triggers: ["business meaning", "rationale", "requirement", "decision", "troubleshooting", "known issue", "why"]
        primary_source_kind: "note"
        secondary_source_kind: "code only when implementation facts are referenced"
      - route: "code_led"
        triggers: ["current behavior", "parameter", "script_id", "deployment_id", "module dependency", "function", "line", "actual implementation"]
        primary_source_kind: "code"
        secondary_source_kind: "note for business context or historical explanation"
      - route: "mixed"
        triggers: ["how does it work and why", "impact analysis", "bug explanation", "implementation plus rationale"]
        primary_source_kind: "note and code"
        secondary_source_kind: "none"
    filter_fields_for_export:
      - "source_kind: note|code"
      - "project"
      - "script_id / deployment_id / object_id"
      - "repo_id / language / symbol_name"
      - "status / updated_at / indexed_at"
    source_refs:
      - "src/netsuite_rag_mcp/server.py:89-108"
      - "src/netsuite_rag_mcp/metadata.py:40-49"
      - "docs/plan/20260514-dual-source-rag-design-export/research_findings_RAG 工作区优化.yaml:594-646"
  merge_policy_for_notes_code:
    concise_copy: |
      Merge notes and code by entity first, then by fact type. Use shared anchors such as project, script ID, deployment ID, object ID, repo path, symbol, and related records. Do not copy code into notes to make the answer convenient; keep code snippets bounded and cite the code path directly.
    rules:
      - "Group retrieved snippets by entity: project, script_id, deployment_id, object_id, repo_path, symbol_name, related_records."
      - "For implementation facts, prefer `source_kind=code`; include notes only as context or if they independently match the code fact."
      - "For business meaning, rationale, requirement background, decisions, and troubleshooting history, prefer `source_kind=note`."
      - "When note and code support different parts of the answer, keep them in separate answer sections rather than forcing one combined claim."
      - "When both support the same claim, cite both code and note citations."
    source_refs:
      - "user_request: Notes = business meaning/rationale/troubleshooting; Code = latest implementation facts."
      - "docs/plan/20260514-dual-source-rag-design-export/research_findings_Obsidian workspace optimization.yaml:7-12"
      - "docs/plan/20260514-dual-source-rag-design-export/research_findings_RAG 工作区优化.yaml:440-448"
  citation_format:
    concise_copy: |
      Inline facts cite `[S1]`, `[S2]`, etc. The source list must include `source_kind` and path so readers can tell whether a fact came from curated notes or current code.
    inline_format: "关键事实 [S1]"
    source_list_format:
      note: "[S1] source_kind=note path=projects/project-a/scripts/restlet/order-sync.md heading=相关脚本 updated_at=2026-05-14"
      code: "[S2] source_kind=code path=repos/project-a/src/restlets/order-sync-restlet.js#L42-L55 symbol=post updated_at=2026-05-14 git_commit=<commit-or-dirty>"
    required_fields:
      - "citation_id"
      - "source_kind"
      - "path"
      - "heading or symbol_name when available"
      - "line_start/line_end for code when available"
      - "updated_at or indexed_at"
    source_refs:
      - "src/netsuite_rag_mcp/retriever.py:39-45"
      - "src/netsuite_rag_mcp/retriever.py:73-78"
      - "docs/superpowers/specs/2026-05-13-netsuite-obsidian-rag-design.md:274-281"
      - "user_request: Answers cite source_kind + path."
  conflict_policy:
    concise_copy: |
      Classify the conflict before choosing a winner. Code wins for current implementation facts. Notes win for business meaning, rationale, requirements, decisions, and troubleshooting unless the note is stale. If the conflict cannot be safely classified, list both claims with citations and mark the answer as uncertain.
    rules:
      - conflict_type: "implementation_fact"
        examples: ["actual parameter", "script_id", "deployment_id", "module dependency", "current function behavior", "field read/write in code"]
        winner: "source_kind=code"
        required_answer_behavior: "State the code-backed fact first, then mention contradictory note text as stale or conflicting if relevant."
      - conflict_type: "business_or_rationale"
        examples: ["why this flow exists", "business purpose", "requirement background", "troubleshooting lesson", "decision reason"]
        winner: "source_kind=note unless stale"
        required_answer_behavior: "Use the note-backed rationale; code can support observed behavior but not invent intent."
      - conflict_type: "freshness_or_status"
        examples: ["active vs inactive", "old note vs newer code", "superseded decision", "changed object/config"]
        winner: "newer authoritative source for that fact type"
        required_answer_behavior: "Mention status/date/update evidence and why one source is treated as fresher."
      - conflict_type: "unclassified"
        examples: ["ambiguous entity", "missing timestamp", "two notes disagree without code evidence"]
        winner: "none"
        required_answer_behavior: "List both claims and sources; do not merge into a single answer."
    stale_note_indicators:
      - "note status is inactive or superseded"
      - "note updated_at is older than the relevant code commit/indexed_at and describes an implementation detail"
      - "note copies code behavior that current code contradicts"
      - "note lacks the entity anchor needed to match the current script/object/code path"
    source_refs:
      - "src/netsuite_rag_mcp/policy.py:16-19"
      - "src/netsuite_rag_mcp/policy.py:32-34"
      - "docs/superpowers/specs/2026-05-13-netsuite-obsidian-rag-design.md:283-288"
      - "user_request: code wins for implementation facts; notes win for business/rationale unless stale."
  answer_structure:
    concise_copy: |
      Use a predictable answer shape: direct answer first, then implementation facts, business/rationale or troubleshooting context, conflicts/staleness, and sources. Omit empty sections, but never omit sources for key facts.
    sections:
      - name: "结论"
        content: "One or two sentences answering the user directly, with citations."
      - name: "实现事实"
        content: "Current code-backed behavior, IDs, paths, parameters, modules, and line-level facts."
      - name: "业务/原因/排坑背景"
        content: "Note-backed business meaning, rationale, requirements, decisions, troubleshooting, and caveats."
      - name: "冲突与时效性"
        content: "Only when triggered; list conflicting claims, source_kind/path, winner, and reason."
      - name: "来源"
        content: "Map each `[Sx]` to `source_kind`, path, heading/symbol, line range, and freshness fields."
    source_refs:
      - "src/netsuite_rag_mcp/retriever.py:94-98"
      - "src/netsuite_rag_mcp/policy.py:21-27"
      - "docs/superpowers/specs/2026-05-13-netsuite-obsidian-rag-design.md:290-296"
  concrete_example:
    question: "Order Sync RESTlet 是直接处理订单，还是提交 Map/Reduce？为什么？"
    assumed_retrieved_sources:
      - citation_id: "S1"
        source_kind: "code"
        path: "repos/project-a/src/restlets/order-sync-restlet.js#L42-L55"
        fact: "RESTlet validates input, writes/returns tracking data, and submits `customscript_order_sync_mr`; no direct sales order processing is shown in this snippet."
      - citation_id: "S2"
        source_kind: "note"
        path: "projects/project-a/scripts/restlet/order-sync.md#相关脚本"
        fact: "The script note says the RESTlet submits `customscript_order_sync_mr` for order sync."
      - citation_id: "S3"
        source_kind: "note"
        path: "projects/project-a/decisions/restlet-mapreduce-architecture.md#理由"
        fact: "The decision note explains the rationale: RESTlet should acknowledge and delegate long-running work to Map/Reduce."
    example_answer: |
      结论：Order Sync RESTlet 不应被描述为直接完成订单处理；当前实现事实以代码为准，它提交 `customscript_order_sync_mr` 让 Map/Reduce 处理后续同步 [S1]。脚本说明也支持这一点 [S2]。

      实现事实：代码来源显示 RESTlet 的职责是校验/登记请求并提交 Map/Reduce，而不是在 RESTlet 内完成全部订单处理 [S1]。

      业务/原因背景：笔记中的设计理由是避免 RESTlet 承担长耗时处理，把异步批处理交给 Map/Reduce，便于追踪和补偿 [S3]。

      冲突与时效性：如果旧笔记声称 RESTlet 直接处理订单，这属于实现事实冲突；应以代码来源 [S1] 为准，并把旧笔记标记为可能过期。

      来源：
      - [S1] source_kind=code path=repos/project-a/src/restlets/order-sync-restlet.js#L42-L55
      - [S2] source_kind=note path=projects/project-a/scripts/restlet/order-sync.md#相关脚本
      - [S3] source_kind=note path=projects/project-a/decisions/restlet-mapreduce-architecture.md#理由
    source_refs:
