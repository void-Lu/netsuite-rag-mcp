plan_id: "20260514-dual-source-rag-design-export"
objective: "Produce concise design material for an exported document covering dual-source retrieval, note/code merge, citations, conflict policy, answer structure, and a concrete example."
focus_area: "dual-source retrieval and conflict policy"
created_at: "2026-05-14"
created_by: "GitHub Copilot researcher"
status: completed
tldr: |
  - Current implementation is a note-first RAG MCP prototype: `ask_netsuite_rag` returns `context_blocks`, `sources`, `answer_policy`, diagnostics, and a suggested answer format.
  - Current citations use `[Sx]` IDs and source mappings with `source_path`, `heading`, `doc_id`, `chunk_index`, and `updated_at`; exported dual-source answers should add `source_kind=note|code` to each citation entry.
  - Notes are the authority for business meaning, rationale, requirements, decisions, and troubleshooting; code is the authority for current implementation facts.
  - Conflict resolution should classify the disputed field first: code wins for implementation facts; notes win for business/rationale unless the note is stale, superseded, or contradicted by current code for an implementation detail.
