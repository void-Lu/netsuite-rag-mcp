plan_id: "20260514-dual-source-rag-design-export"
objective: "Produce concise design material for optimizing the RAG workspace for dual-source indexing of Obsidian notes and local NetSuite project repos."
focus_area: "RAG 工作区优化"
created_at: "2026-05-14"
created_by: "GitHub Copilot researcher"
status: completed
tldr: |
  - Current prototype is Markdown-first: `rag/sources.yaml` configures `include` paths, `exclude` names, ChromaDB storage, collection name, and embedding model; `config.load_config()` resolves those into a single `RagConfig`.
  - Current indexing scans only `*.md`, parses YAML frontmatter, chunks by H2 sections while preserving fenced code, embeds chunks, writes Chroma records, and uses an mtime-based manifest for full/incremental runs.
  - Current retrieval queries Chroma, applies in-Python metadata filters, redacts returned text, and exposes FastMCP tools for `index_vault`, `search_netsuite_knowledge`, `ask_netsuite_rag`, and `get_index_status`.
  - Dual-source optimization needs a source registry that distinguishes curated Obsidian notes from authoritative code repos, adds source/repo/language/symbol metadata, and keeps code details indexed directly from repos instead of bulk-copying implementation into notes.
  - Key gaps are absent repo source schema, Markdown-only collection, no repo/code parser, and incremental logic that does not purge deleted files from the manifest/vector store.
research_metadata:
  methodology: "file_search + grep_search + read_file across docs, config, indexer, retriever, server, vector store, parser/chunker, tests, and current rag/sources.yaml; semantic_search was attempted twice and timed out, so exact search and direct reads were used."
  scope: "Existing Python MCP prototype and export-section design material for dual-source RAG workspace optimization."
  confidence: high
  coverage: 90
  decision_blockers: 2
  research_blockers: 0
