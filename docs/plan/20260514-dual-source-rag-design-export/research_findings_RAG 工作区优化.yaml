  sources_yaml_schema_proposal:
    description: "Extend the flat `include` list into a typed source registry while keeping Chroma and embedding settings centralized."
    yaml: |
      schema_version: 2
      workspace_root: .
      index:
        chroma_path: .rag-index/chroma
        collection_name: netsuite_knowledge
        embedding_model: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
        manifest_path: .rag-index/index-manifest.json
      defaults:
        exclude_names: [.git, .obsidian, .superpowers, .rag-index, node_modules, dist, build, coverage]
      sources:
        - id: obsidian_notes
          type: obsidian_notes
          root: .
          include: [projects, knowledge]
          file_globs: ["**/*.md"]
          parser: markdown_frontmatter_h2
          authority: curated_context
          metadata_defaults:
            source_type: note
        - id: netsuite_repos
          type: git_repos
          root: ../netsuite-repos
          repos:
            - id: project_a_repo
              path: project-a
              project: project-a
          file_globs: ["**/*.js", "**/*.ts", "**/*.xml", "**/*.json", "**/*.md"]
          exclude_names: [.git, node_modules, dist, build, coverage]
          parser: code_symbols_with_text_fallback
          authority: source_of_truth
          metadata_defaults:
            source_type: code
    source_refs:
      - "Current flat schema: rag/sources.yaml:1"
      - "Current defaults: src/netsuite_rag_mcp/config.py:8"
      - "User source-truth requirement: user_request"
  indexer_behavior:
    - behavior: "Load the source registry, expand each source into concrete files, and tag every chunk with `source_id`, `source_type`, and authority metadata."
      source_refs:
        - "src/netsuite_rag_mcp/config.py:15"
        - "src/netsuite_rag_mcp/chunker.py:15"
    - behavior: "Keep existing Markdown note path: YAML frontmatter parsing, H2 chunking, inherited metadata, and Chroma upsert remain the note-source pipeline."
      source_refs:
        - "src/netsuite_rag_mcp/parser.py:16"
        - "src/netsuite_rag_mcp/chunker.py:36"
        - "src/netsuite_rag_mcp/vector_store.py:113"
    - behavior: "Add a repo path that reads implementation files directly from local repos, chunks code by symbols/functions/classes where possible, falls back to bounded text chunks, and stores citations to repo path plus line/symbol coordinates."
      source_refs:
        - "user_request: local NetSuite project repos are indexed and are source of truth"
    - behavior: "Do not bulk-copy code into Obsidian notes; notes can link to repo paths or summarize decisions, while implementation chunks are refreshed from repos."
      source_refs:
        - "user_request: Avoid model bulk-reading/writing code to notes."
    - behavior: "Before upsert, delete old chunks by stable `doc_id`; for changed files, recompute chunks and replace them."
      source_refs:
        - "src/netsuite_rag_mcp/vector_store.py:103"
        - "src/netsuite_rag_mcp/indexer.py:94"
    - behavior: "Return per-source counts, skipped files, indexed chunks, deleted/stale chunks, and errors in the index report."
      source_refs:
        - "Current report keys: src/netsuite_rag_mcp/indexer.py:123"
  metadata_model:
    common_fields:
      - "source_id"
      - "source_type: note|code"
      - "authority: curated_context|source_of_truth"
      - "doc_id"
      - "chunk_id"
      - "chunk_index"
      - "source_path"
      - "absolute_source_root_id"
      - "project"
      - "updated_at"
      - "indexed_at"
      - "mtime"
      - "content_hash"
    note_fields:
      - "type"
      - "heading"
      - "author"
      - "script_type"
      - "script_id"
      - "deployment_id"
      - "related_records"
      - "related_script_ids"
      - "object_type"
      - "status"
      - "tags"
      - "zentao_urls"
    code_fields:
      - "repo_id"
      - "repo_path"
      - "git_branch"
      - "git_commit"
      - "language"
      - "symbol_name"
      - "symbol_kind"
      - "line_start"
      - "line_end"
      - "netsuite_script_ids_detected"
      - "deployment_ids_detected"
      - "module_path"
    serialization_notes: "Reuse Chroma-safe scalar metadata and JSON/text dual storage for array fields; extend the array field registry for detected IDs and tags."
    source_refs:
      - "Existing common chunk metadata: src/netsuite_rag_mcp/chunker.py:15"
      - "Existing array serialization: src/netsuite_rag_mcp/metadata.py:9"
      - "Existing array fields: src/netsuite_rag_mcp/models.py:7"
  incremental_freshness_strategy:
    - item: "Manifest key becomes `source_id + relative_path` so notes and repo files can share a collection without collisions."
      source_refs:
        - "Current manifest is relative_path keyed: src/netsuite_rag_mcp/indexer.py:14"
    - item: "Quick-skip uses mtime and size; changed candidates get a content hash; repo entries also store git commit/branch when available."
      source_refs:
        - "Current skip uses mtime: src/netsuite_rag_mcp/indexer.py:83"
    - item: "Deleted files are detected by comparing manifest keys to the latest scan and deleting stale doc IDs from Chroma."
      source_refs:
        - "Current code collects current files but has no manifest-vs-scan stale purge: src/netsuite_rag_mcp/indexer.py:75"
        - "Existing delete primitive: src/netsuite_rag_mcp/vector_store.py:103"
    - item: "Full mode resets the whole collection; incremental mode updates changed docs and purges removed docs per source."
      source_refs:
        - "Current full reset behavior: src/netsuite_rag_mcp/indexer.py:55"
    - item: "Status reports should include per-source last indexed time, scanned files, indexed chunks, skipped files, stale deletions, errors, and current collection count."
      source_refs:
        - "Current status returns manifest_exists and collection_count: src/netsuite_rag_mcp/server.py:70"
  mcp_tool_filter_changes:
    index_vault:
      current: "`vault_root` and `mode` only."
      changes:
        - "Add `source_ids` to index only selected note/repo sources."
        - "Add `source_types` for `note` or `code` targeted refresh."
        - "Return per-source indexed/skipped/deleted/error counts."
      source_refs:
        - "src/netsuite_rag_mcp/server.py:111"
    search_netsuite_knowledge_and_ask_netsuite_rag:
      current_filters:
        - "project"
        - "script_type"
        - "related_records"
        - "related_script_ids"
        - "object_type"
        - "status"
      added_filters:
        - "source_type"
        - "source_id"
        - "repo_id"
        - "language"
        - "symbol_name"
        - "authority"
        - "updated_after"
        - "include_code_context"
      bounded_return_behavior: "For code results, return concise symbol/file snippets with line coordinates and citations; do not provide tools that write generated summaries into notes."
      source_refs:
        - "Current filters: src/netsuite_rag_mcp/server.py:89"
        - "Current search/ask tools: src/netsuite_rag_mcp/server.py:123"
        - "User no-bulk-read/write constraint: user_request"
    get_index_status:
      current: "Returns indexed boolean, vault root, manifest existence, and collection count."
      changes:
        - "Add per-source freshness, last indexed commit/mtime, stale/deleted counts, and last error summaries."
      source_refs:
        - "src/netsuite_rag_mcp/server.py:70"
  risks_and_mitigations:
    - risk: "Note-code drift when implementation details are copied into Obsidian."
      mitigation: "Treat code repos as source_of_truth chunks and keep notes for context/decisions/links; retrieval can combine note and code citations."
      source_refs:
        - "user_request: Code repos are source of truth for implementation details."
    - risk: "Model receives too much code or triggers bulk note/code writing."
      mitigation: "MCP exposes search/ask/index/status only; code snippets are top-k, filtered, and bounded; no write-to-notes/code tool is introduced."
      source_refs:
        - "src/netsuite_rag_mcp/server.py:111"
        - "user_request: Avoid model bulk-reading/writing code to notes."
    - risk: "Secrets or PII in local repos surface through retrieval."
      mitigation: "Extend excludes for secret/config/build paths, keep existing redaction on returned text, and mark `secret_detected` entries for review."
      source_refs:
        - "src/netsuite_rag_mcp/redaction.py:5"
    - risk: "Stale deleted files remain retrievable."
      mitigation: "Compare manifest entries with the current source scan and call `delete_doc` for removed files."
      source_refs:
        - "src/netsuite_rag_mcp/indexer.py:75"
        - "src/netsuite_rag_mcp/vector_store.py:103"
    - risk: "Mixed note/code results reduce precision."
      mitigation: "Add `source_type`, `authority`, `repo_id`, `language`, and `project` filters; keep metadata filtering path already used by retriever."
      source_refs:
        - "src/netsuite_rag_mcp/metadata.py:40"
        - "src/netsuite_rag_mcp/server.py:89"
open_questions:
  - question: "Where are the local NetSuite project repos located relative to the Obsidian vault?"
    context: "Current config only knows vault-relative `projects` and `knowledge`; no repo root/path registry exists."
    type: decision_blocker
    affects:
      - "sources.yaml schema"
      - "path resolution"
      - "indexer source scanning"
  - question: "Which file types in NetSuite repos should be indexed first?"
    context: "The current prototype only scans Markdown; repo indexing needs a bounded language/artifact list such as SuiteScript JS/TS, XML/object metadata, JSON manifests, and repo Markdown."
    type: decision_blocker
    affects:
      - "code parser"
      - "exclude/include globs"
      - "retrieval precision"
  - question: "Should notes and code share one Chroma collection with `source_type` filters, or use separate collections?"
    context: "Current config has one `collection_name`; a single collection simplifies cross-source retrieval, while separate collections can isolate scoring and lifecycle."
    type: research
    affects:
      - "Chroma schema"
      - "retriever fanout"
      - "status reporting"
  - question: "How should repo git metadata be captured on dirty working trees?"
    context: "Freshness can cite commit hashes for clean repos, but local uncommitted changes need a `dirty` flag and content hash to remain accurate."
    type: research
    affects:
      - "freshness diagnostics"
      - "citations"
      - "staleness rules"
gaps:
  - area: "source configuration"
    description: "No typed source registry exists; current config is a flat Markdown include/exclude list."
    impact: decision_blocker
    affects:
      - "dual-source scanning"
      - "per-source status"
  - area: "code repo indexing"
    description: "No code parser, repo scanner, language detector, symbol chunker, or git metadata collector exists."
    impact: research_blocker
    affects:
      - "implementation-detail retrieval"
      - "source-of-truth citations"
  - area: "incremental deletion"
    description: "Current incremental mode skips unchanged files but does not compare manifest entries against the latest scan to delete removed documents from Chroma."
    impact: research_blocker
    affects:
      - "freshness"
      - "stale result prevention"
  - area: "filter model"
    description: "Current MCP filters are NetSuite note-centric and do not include source_type, repo_id, language, symbol, authority, or freshness filters."
    impact: research_blocker
    affects:
      - "mixed note/code retrieval precision"
  - area: "security boundary for code repos"
    description: "Redaction exists at retrieval output, but there is no pre-index secret exclusion/flagging path for repo contents."
    impact: nice_to_know
    affects:
      - "safe code retrieval"
      - "risk reporting"
