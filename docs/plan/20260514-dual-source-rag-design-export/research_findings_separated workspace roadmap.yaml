plan_id: "20260514-dual-source-rag-design-export"
objective: "Produce concise export-ready design material for a separated Obsidian workspace and RAG workspace roadmap."
focus_area: "separated workspace roadmap"
created_at: "2026-05-14"
created_by: "GitHub Copilot researcher"
status: completed
tldr: |
  - The exported design should split ownership into two workstreams: Obsidian workspace for human-authored NetSuite knowledge and RAG workspace for indexing, retrieval, citations, policy, vector storage, and MCP tools.
  - MVP scope is note-first and local: structured Obsidian directories/templates plus current Markdown indexing, ChromaDB, MCP search/ask tools, citations, answer policy, metadata filters, and redaction.
  - Dual-source code-repo indexing belongs after the MVP boundary: introduce a typed source registry, source_kind/source_type metadata, repo/code parsers, git freshness, and note/code conflict diagnostics.
  - Acceptance should verify document completeness, workspace ownership, required metadata/frontmatter, indexed paths, source citations, sensitive-data boundaries, and current RAG tool behavior.
  - Later enhancements include repo symbol indexing, stale deletion, secret scanning before indexing, evaluations, watchers, UI, team deployment, and optional NetSuite/ZenTao connectors.
research_metadata:
  methodology: "semantic_search for workspace/RAG examples; grep_search for roadmap/MVP/source/conflict terms; read_file for original design, existing research YAMLs, README, Index, rag/sources.yaml, templates, Python modules, and tests."
  scope: "Export-ready design material only; no code implementation and no Markdown document creation."
  confidence: high
  coverage: 92
  decision_blockers: 3
  research_blockers: 0
  notes:
    - "No AGENTS.md, docs/PRD.yaml, or docs/skills/*.skill.md file was found in workspace search."
    - "Existing plan findings already cover Obsidian workspace optimization, RAG workspace optimization, and dual-source conflict policy; this file consolidates them into separated-workstream roadmap material."
