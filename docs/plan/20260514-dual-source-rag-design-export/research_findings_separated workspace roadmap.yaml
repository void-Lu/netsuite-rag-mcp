  structure_of_domain: "Obsidian workspace is directory/template/note oriented; RAG workspace is config/package/index/tool oriented; code repos are external implementation sources for future dual-source indexing."
  error_handling_in_domain: "Indexer records per-file errors without aborting the whole run; server validates mode; answer policy requires conflict listing and uncertainty instead of forced merges."
  testing_in_domain: "Current tests use pytest and FakeEmbedder to avoid external model calls while checking deterministic indexing/retrieval behavior."
  documentation_in_domain: "Existing docs define architecture, MVP boundaries, Answer Policy, component boundaries, and export-focused Obsidian/RAG/dual-source material."
