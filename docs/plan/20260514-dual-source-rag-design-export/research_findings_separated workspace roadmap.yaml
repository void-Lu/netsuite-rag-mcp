      location: "src/netsuite_rag_mcp/redaction.py:5-22; src/netsuite_rag_mcp/retriever.py:32-38"
      concern: "Retrieved text is redacted before return, but pre-index secret scanning is not implemented."
    - area: "Future code repo indexing"
      location: "docs/plan/20260514-dual-source-rag-design-export/research_findings_RAG 工作区优化.yaml:631-646"
      concern: "Local repos may contain secrets, generated artifacts, or large logs; source excludes and secret flagging are later RAG workspace responsibilities."
  authentication_patterns_in_domain: "No multi-user authentication layer is present in the current local prototype."
  authorization_patterns_in_domain: "The original MVP excludes multi-user permissions and team deployment."
  data_validation_in_domain: "Config loading uses YAML-safe loading; frontmatter list fields are normalized; server mode is constrained to full or incremental; current filter values are passed as metadata filters."
testing_patterns:
  framework: "pytest"
  coverage_areas: ["config", "templates", "parser", "chunker", "metadata", "redaction", "policy", "indexing", "retrieval", "MCP tool wrappers"]
  test_organization: "Unit/regression tests live under tests/ and use FakeEmbedder for deterministic local execution."
  mock_patterns: ["FakeEmbedder for vector tests", "tmp_path Vault fixtures", "inline sources.yaml and Markdown note fixtures"]
export_design_material:
  phased_roadmap:
    - phase: "0_export_baseline"
      concise_copy: "Freeze the exported design around two workstreams: Obsidian owns human knowledge structure; RAG owns indexing, retrieval, citations, policy, and MCP behavior."
      primary_owner: "documentation/export"
      outputs:
        - "One ownership matrix for Obsidian workspace vs RAG workspace."
        - "One MVP boundary list with explicit out-of-scope items."
        - "One acceptance-criteria checklist for both follow-up workstreams."
      acceptance:
        - "Exported document contains roadmap, MVP boundaries, acceptance criteria, later enhancements, and workspace ownership."
        - "Every roadmap phase states whether it belongs to Obsidian, RAG, or both."
      source_refs:
        - "user_request"
        - "docs/plan/20260514-dual-source-rag-design-export/research_findings_Obsidian workspace optimization.yaml:454-708"
        - "docs/plan/20260514-dual-source-rag-design-export/research_findings_RAG 工作区优化.yaml:438-646"
    - phase: "1_obsidian_workspace_foundation"
      concise_copy: "Optimize the Obsidian directory workspace before expanding RAG: stabilize projects/knowledge/templates/_index, required frontmatter, note placement rules, and no-code-mirror hygiene."
      primary_owner: "Obsidian workspace"
      outputs:
        - "Project directory pattern under projects/<project>/ with overview, requirements, scripts, objects, troubleshooting, and decisions."
        - "Cross-project knowledge placement under knowledge/."
        - "Template/frontmatter rules for script, object, requirement, troubleshooting, and decision notes."
        - "What-not-to-store rules for secrets, PII, bulk code copies, generated artifacts, and scraped source dumps."
      acceptance:
        - "Each note type has required metadata fields and stable section headings."
        - "Implementation details are represented by IDs, paths, links, summaries, and decisions rather than full repository mirrors."
        - "Retrievable human notes are placed under paths included by the current RAG config, especially projects and knowledge."
      source_refs:
        - "docs/superpowers/specs/2026-05-13-netsuite-obsidian-rag-design.md:48-101"
        - "templates/script-note.md:1-30"
        - "templates/object-note.md:1-19"
        - "templates/requirement-note.md:1-19"
        - "templates/troubleshooting-note.md:1-26"
    - phase: "2_rag_note_first_mvp"
      concise_copy: "Keep the RAG workspace MVP note-first and local: index configured Markdown notes, preserve metadata, return citations/sources/policy, apply redaction, and expose only controlled MCP tools."
      primary_owner: "RAG workspace"
      outputs:
        - "Stable rag/sources.yaml config for note indexing."
        - "Full/incremental Markdown indexing into local ChromaDB."
        - "Search and ask tools with metadata filters, context_blocks, sources, answer_policy, and diagnostics."
        - "Regression tests for current config, parsing, chunking, indexing, retrieval, citations, policy, and tool wrappers."
      acceptance:
        - "index_vault can index projects/knowledge Markdown and report indexed_files, skipped_files, indexed_chunks, errors, and collection_count."
        - "ask_netsuite_rag returns context_blocks, sources with source_path/heading/doc_id/chunk_index/updated_at, answer_policy, and requires citations."
        - "Returned text is redacted before output; the policy instructs the model not to expose secrets/PII."
      source_refs:
        - "rag/sources.yaml:1-11"
        - "src/netsuite_rag_mcp/indexer.py:21-128"
        - "src/netsuite_rag_mcp/retriever.py:51-99"
        - "src/netsuite_rag_mcp/redaction.py:5-22"
        - "tests/test_indexer_retriever.py:89-156"
    - phase: "3_dual_source_rag_expansion"
      concise_copy: "After the note-first MVP is stable, extend RAG to read local NetSuite code repos directly through a typed source registry and keep note/code authority visible in every answer."
      primary_owner: "RAG workspace with Obsidian contract input"
      outputs:
        - "Typed source registry for obsidian notes and code repos."
        - "Metadata additions: source_kind or source_type, authority, source_id, repo_id, language, symbol_name, line_start, line_end, git_commit, and freshness fields."
        - "Retrieval routing for note-led, code-led, and mixed questions."
        - "Conflict policy that treats code as authority for implementation facts and notes as authority for business/rationale/troubleshooting unless stale."
      acceptance:
        - "Citations expose source_kind/source_type and path so readers can distinguish curated notes from current code."
        - "Code snippets remain bounded and cited by repo path plus line/symbol coordinates; code is not bulk-copied into Obsidian notes."
        - "Conflicting note/code claims are listed with source role, path, freshness, and reason instead of silently merged."
      source_refs:
        - "docs/plan/20260514-dual-source-rag-design-export/research_findings_RAG 工作区优化.yaml:465-646"
        - "docs/plan/20260514-dual-source-rag-design-export/research_findings_dual-source retrieval and conflict policy.yaml:399-552"
    - phase: "4_quality_security_and_scale"
      concise_copy: "Add reliability and scale features only after the separated workspaces and dual-source contract are stable."
      primary_owner: "RAG workspace, with Obsidian policy input"
      outputs:
        - "Deleted-file purge and per-source freshness/status reporting."
        - "Pre-index secret scanning or secret-detected flags."
        - "Evaluation query set for citations, conflicts, no-answer, and redaction."
        - "Optional watcher, UI, team deployment, and external connectors."
      acceptance:
        - "Stale/deleted files do not remain retrievable after incremental refresh."
        - "Security diagnostics distinguish retrieval redaction from pre-index secret risk."
        - "Evaluation cases cover source citations, note/code conflicts, freshness, and insufficient-context answers."
      source_refs:
        - "docs/superpowers/specs/2026-05-13-netsuite-obsidian-rag-design.md:353-363"
        - "docs/plan/20260514-dual-source-rag-design-export/research_findings_RAG 工作区优化.yaml:568-646"
  mvp_boundaries:
    in_scope:
      obsidian_workspace:
        - item: "Directory and note taxonomy for projects, knowledge, templates, _index, and Index.md."
          source_refs: ["docs/superpowers/specs/2026-05-13-netsuite-obsidian-rag-design.md:52-101"]
        - item: "Script/object/requirement/troubleshooting templates with frontmatter fields used by RAG filters."
          source_refs: ["templates/script-note.md:1-30", "templates/object-note.md:1-19", "templates/requirement-note.md:1-19", "templates/troubleshooting-note.md:1-26"]
        - item: "Manual note hygiene: no secrets/PII, no full code mirrors, code represented through IDs, links, summaries, and decisions."
          source_refs: ["src/netsuite_rag_mcp/redaction.py:5-22", "docs/plan/20260514-dual-source-rag-design-export/research_findings_Obsidian workspace optimization.yaml:633-655"]
      rag_workspace:
        - item: "Markdown/frontmatter indexing for configured note paths."
          source_refs: ["rag/sources.yaml:1-11", "src/netsuite_rag_mcp/indexer.py:134-156"]
        - item: "Local ChromaDB storage, embedding model config, and manifest-based full/incremental runs."
          source_refs: ["src/netsuite_rag_mcp/config.py:8-42", "src/netsuite_rag_mcp/indexer.py:48-121"]
        - item: "MCP tools for index, search, ask, and status; answer generation remains in Copilot."
          source_refs: ["src/netsuite_rag_mcp/server.py:111-154", "README.md:14-18"]
        - item: "Citations, source mappings, answer policy, basic conflict instructions, freshness rules, and redacted output."
          source_refs: ["src/netsuite_rag_mcp/retriever.py:32-99", "src/netsuite_rag_mcp/policy.py:4-51", "src/netsuite_rag_mcp/redaction.py:5-22"]
    out_of_scope_for_mvp:
      - item: "Complex Web UI."
        source_refs: ["docs/superpowers/specs/2026-05-13-netsuite-obsidian-rag-design.md:353-354"]
      - item: "Standalone CLI or VS Code Command as the primary user entry."
        source_refs: ["docs/superpowers/specs/2026-05-13-netsuite-obsidian-rag-design.md:354-355"]
      - item: "Multi-user permission system, team deployment, and shared team index."
        source_refs: ["docs/superpowers/specs/2026-05-13-netsuite-obsidian-rag-design.md:355-361"]
      - item: "Automatic NetSuite account reads or automatic ZenTao crawling."
        source_refs: ["docs/superpowers/specs/2026-05-13-netsuite-obsidian-rag-design.md:356-358"]
      - item: "Realtime file watcher and complete evaluation platform."
        source_refs: ["docs/superpowers/specs/2026-05-13-netsuite-obsidian-rag-design.md:359-363"]
      - item: "Full code-repo symbol indexing and automatic note/code conflict diagnostics."
        source_refs: ["docs/plan/20260514-dual-source-rag-design-export/research_findings_dual-source retrieval and conflict policy.yaml:572-594"]
  acceptance_criteria:
    exported_document:
      - "Contains separate sections for phased roadmap, MVP boundaries, acceptance criteria, later enhancements, and workspace ownership."
      - "States which workstream owns each capability: Obsidian workspace, RAG workspace, both, or external code repos."
      - "Includes one note-first MVP path and one later dual-source expansion path."
      - "Uses the same citation/authority vocabulary consistently: source_kind/source_type, source_path, authority, updated_at/indexed_at."
    obsidian_workspace:
      - "Every retrievable project note belongs under projects/<project>/ or knowledge/ unless the RAG config is updated."
      - "Script, object, requirement, and troubleshooting notes carry the fields present in current templates."
      - "Business/rationale/troubleshooting/decision material is human-authored; implementation facts reference code by IDs, links, repo path, symbol, or short sanitized snippets."
      - "Secrets, tokens, cookies, API keys, raw PII, bulk logs, generated artifacts, and full repository mirrors are not stored as note content."
    rag_workspace:
      - "Config resolves include paths, excludes runtime/editor folders, and points to local Chroma settings."
      - "Full and incremental indexing return counts and per-file errors without requiring Copilot model calls."
      - "Search/ask tools support project/script/object/status metadata filters and return citation IDs."
      - "ask output includes context_blocks, sources, answer_policy, diagnostics, and suggested response format."
      - "Returned snippets are redacted before reaching Copilot."
    dual_source_readiness:
      - "Design names the future typed source registry and required note/code metadata fields."
      - "Code is defined as authority for implementation facts; notes are defined as authority for business meaning, rationale, decisions, and troubleshooting unless stale."
      - "Conflict behavior lists claims with citations and does not silently merge contradictory sources."
      - "Citations include enough source role/path metadata to support separate Obsidian and RAG follow-up workstreams."
  later_enhancements:
    - enhancement: "Typed source registry v2 for notes and NetSuite repos."
      belongs_to: "RAG workspace"
      source_refs: ["docs/plan/20260514-dual-source-rag-design-export/research_findings_RAG 工作区优化.yaml:465-503"]
    - enhancement: "Code repo scanner, language detection, symbol/function/class chunking, and line-range citations."
      belongs_to: "RAG workspace"
      source_refs: ["docs/plan/20260514-dual-source-rag-design-export/research_findings_RAG 工作区优化.yaml:514-557"]
    - enhancement: "source_kind/source_type filters, authority filters, repo/language/symbol filters, and freshness filters."
      belongs_to: "RAG workspace"
      source_refs: ["docs/plan/20260514-dual-source-rag-design-export/research_findings_RAG 工作区优化.yaml:594-614"]
    - enhancement: "Automated note/code conflict grouping, stale-note flags, and answer diagnostics."
      belongs_to: "RAG workspace"
      source_refs: ["docs/plan/20260514-dual-source-rag-design-export/research_findings_dual-source retrieval and conflict policy.yaml:572-594"]
    - enhancement: "Decision-note template and validation if decisions remain a first-class note type."
      belongs_to: "Obsidian workspace"
      source_refs: ["docs/plan/20260514-dual-source-rag-design-export/research_findings_Obsidian workspace optimization.yaml:681-690"]
    - enhancement: "Generated/manual _index pages policy: decide whether they are human navigation only or indexed by RAG."
      belongs_to: "both"
      source_refs: ["docs/plan/20260514-dual-source-rag-design-export/research_findings_Obsidian workspace optimization.yaml:691-699"]
    - enhancement: "Deleted-file purge and per-source status/freshness reports."
      belongs_to: "RAG workspace"
      source_refs: ["docs/plan/20260514-dual-source-rag-design-export/research_findings_RAG 工作区优化.yaml:568-591"]
    - enhancement: "Pre-index secret scanning and secret_detected review flags for repo contents."
      belongs_to: "RAG workspace"
      source_refs: ["docs/plan/20260514-dual-source-rag-design-export/research_findings_RAG 工作区优化.yaml:631-641"]
    - enhancement: "Realtime watcher, team deployment/shared index, complete evaluation platform, and complex UI."
      belongs_to: "later productization"
      source_refs: ["docs/superpowers/specs/2026-05-13-netsuite-obsidian-rag-design.md:353-363"]
    - enhancement: "Automatic NetSuite account reads and ZenTao connectors."
      belongs_to: "later integrations"
      source_refs: ["docs/superpowers/specs/2026-05-13-netsuite-obsidian-rag-design.md:356-358"]
  workspace_ownership_matrix:
    obsidian_workspace:
      owns:
        - "Index.md and _index human navigation."
        - "projects/<project>/ overview, requirements, scripts, objects, troubleshooting, and decisions."
        - "knowledge/ cross-project patterns and lessons."
        - "templates/ and frontmatter discipline."
        - "Human-authored summaries, rationale, requirements, troubleshooting, decisions, ZenTao URLs, and metadata anchors."
      does_not_own:
        - "Local vector DB runtime data such as .rag-index."
        - "Full repository code mirrors or generated build/dependency output."
        - "Raw secrets, tokens, cookies, customer PII, or long logs."
        - "Automatic source crawling or answer-generation policy enforcement."
      source_refs:
        - "docs/superpowers/specs/2026-05-13-netsuite-obsidian-rag-design.md:52-101"
        - "docs/plan/20260514-dual-source-rag-design-export/research_findings_Obsidian workspace optimization.yaml:454-655"
    rag_workspace:
      owns:
        - "rag/sources.yaml and future source registry."
        - "src/netsuite_rag_mcp package: config, parser, chunker, metadata, redaction, policy, vector_store, indexer, retriever, server."
        - "tests/ for config, templates, parser/chunker, metadata/redaction/policy, indexer/retriever, and server tools."
        - "ChromaDB/index manifest runtime artifacts and per-source status."
        - "MCP tools, retrieval filters, context_blocks, sources, answer_policy, citations, redaction, and freshness/conflict diagnostics."
      does_not_own:
        - "Human editorial decisions about business meaning or requirement rationale."
        - "Bulk writing generated summaries back into Obsidian notes."
        - "Treating stale notes as implementation truth when code contradicts them."
        - "Team permissions, external connectors, or UI in MVP."
      source_refs:
        - "rag/sources.yaml:1-11"
        - "src/netsuite_rag_mcp/server.py:111-154"
        - "docs/plan/20260514-dual-source-rag-design-export/research_findings_RAG 工作区优化.yaml:438-646"
    external_code_repositories:
      owns:
        - "Current implementation facts, actual SuiteScript behavior, module dependencies, IDs present in code, and line-level implementation."
      relation_to_workstreams: "Read-only source for future RAG indexing; referenced by Obsidian notes through IDs/paths/summaries but not copied wholesale."
      source_refs:
        - "docs/plan/20260514-dual-source-rag-design-export/research_findings_dual-source retrieval and conflict policy.yaml:399-552"
  handoff_contracts_between_workstreams:
    - contract: "Metadata fields"
      details: "Obsidian supplies project, type, script_type, script_id, deployment_id, related_records, related_script_ids, object_type, status, tags, and zentao_urls; RAG preserves these as chunk metadata and filters."
      source_refs: ["templates/script-note.md:1-11", "src/netsuite_rag_mcp/chunker.py:15-23", "src/netsuite_rag_mcp/server.py:89-108"]
    - contract: "Indexed paths"
      details: "Obsidian places retrievable notes under paths included by sources.yaml; RAG indexes only configured paths and excludes runtime/editor folders."
      source_refs: ["rag/sources.yaml:1-8", "src/netsuite_rag_mcp/config.py:30-33"]
    - contract: "Citations"
      details: "RAG returns sources/citation IDs; exported dual-source design adds source_kind/source_type and path so users can distinguish note vs code evidence."
      source_refs: ["src/netsuite_rag_mcp/retriever.py:32-78", "docs/plan/20260514-dual-source-rag-design-export/research_findings_dual-source retrieval and conflict policy.yaml:455-469"]
    - contract: "Authority"
      details: "Notes carry business/rationale/decision/troubleshooting authority; code carries implementation authority; conflict handling must classify fact type before selecting or listing sources."
      source_refs: ["docs/plan/20260514-dual-source-rag-design-export/research_findings_dual-source retrieval and conflict policy.yaml:443-501"]
open_questions:
  - question: "Should Obsidian workspace and RAG workspace remain in one repository/Vault or be split into separate repos/workspaces?"
    context: "Current workspace stores Obsidian notes, rag config, Python package, tests, and docs together; user says follow-up workstreams will optimize them separately."
    type: decision_blocker
    affects:
      - "repository layout"
      - "handoff contracts"
      - "source path conventions"
  - question: "Should the exported design standardize on `source_kind` or `source_type`, or document both as user-facing vs internal names?"
    context: "Dual-source export text uses source_kind for citations; RAG workspace research uses source_type metadata."
    type: decision_blocker
    affects:
      - "citation schema"
      - "metadata filters"
      - "answer examples"
  - question: "Which NetSuite repo file types and repo roots are in scope for the first dual-source expansion?"
    context: "Current RAG implementation scans Markdown only; future code indexing needs concrete repo locations and file globs."
    type: decision_blocker
    affects:
      - "source registry"
      - "code parser"
      - "security excludes"
  - question: "Should `_index/` pages be indexed by RAG or remain human navigation only?"
    context: "The design includes _index navigation pages, while current sources.yaml indexes projects and knowledge."
    type: nice_to_know
    affects:
      - "retrieval recall"
      - "duplicate citations"
  - question: "Should notes and code share one Chroma collection with source filters or use separate collections with score normalization?"
    context: "Current config has one collection; dual-source research keeps this as a design choice."
    type: research
    affects:
      - "retrieval ranking"
      - "index lifecycle"
      - "status reporting"
gaps:
  - area: "explicit workspace split"
    description: "Original design contains component boundaries, but the current exported materials were separate by topic and did not yet consolidate an Obsidian-vs-RAG roadmap in one artifact."
    impact: nice_to_know
    affects:
      - "exported design structure"
      - "follow-up workstream handoff"
  - area: "typed source registry"
    description: "Current rag/sources.yaml is a flat note-oriented include/exclude config; it does not yet encode separate note/code source types, authority, repo IDs, or source IDs."
    impact: decision_blocker
    affects:
      - "dual-source scanning"
      - "workspace ownership"
      - "per-source status"
  - area: "code repo ingestion"
    description: "Current indexer scans Markdown only; no repo scanner, code parser, symbol chunker, language detector, or git metadata collector exists."
    impact: research_blocker
    affects:
      - "implementation fact retrieval"
      - "line-level citations"
  - area: "source role metadata in current output"
    description: "Current sources include path, heading, doc_id, chunk_index, and updated_at, but do not expose source_kind/source_type for note-vs-code evidence."
    impact: research_blocker
    affects:
      - "dual-source citations"
      - "conflict policy"
  - area: "automatic no-code-mirror enforcement"
    description: "Templates include a code snippet section and policy discourages sensitive/bulk content, but there is no automatic guard preventing large code copies into Obsidian notes."
    impact: nice_to_know
    affects:
      - "Obsidian hygiene"
      - "note-code drift"
  - area: "incremental stale deletion"
    description: "Current incremental indexing skips unchanged files but does not compare manifest entries against the latest scan to purge deleted documents from Chroma."
    impact: research_blocker
    affects:
      - "freshness"
      - "stale retrieval prevention"
