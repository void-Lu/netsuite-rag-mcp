        - "Human-authored note workflow and hygiene rules"
      dependencies:
        - component: "Obsidian research findings"
          relationship: "Supplies workspace responsibilities, template/frontmatter rules, note workflow, and safety boundaries."
        - component: "Separated workspace roadmap findings"
          relationship: "Supplies ownership split and workstream boundaries."
