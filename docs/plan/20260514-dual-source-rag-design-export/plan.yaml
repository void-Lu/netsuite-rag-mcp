tldr: |
  Produce exactly two concise documentation-only design exports under docs/superpowers/specs. The Obsidian document owns human note/workspace structure and RAG handoff contracts. The RAG document owns dual-source indexing, schema, freshness, retrieval/merge/conflict/citation policy, MCP/tool impacts, and roadmap. No AGENTS.md, code, tests, runtime index, or generated artifact changes are in scope.
open_questions: []
gaps:
  - description: "No docs/PRD.yaml or AGENTS.md was present in the workspace; use the user feedback plus the four research findings as the planning source of truth."
    refinement_requests: []
pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: "The two documents duplicate or contradict ownership boundaries, making later separate workspace optimization harder."
      likelihood: medium
      impact: high
      mitigation: "Give each document a distinct scope section and validate the cross-document contract: Obsidian supplies curated note metadata; RAG consumes/indexes/cites it and later adds code sources."
    - scenario: "The Obsidian document drifts into RAG implementation details instead of staying focused on note/workspace optimization."
      likelihood: medium
      impact: medium
      mitigation: "Limit Obsidian content to responsibilities, directory structure, templates/frontmatter, note workflow, what not to store, and relation to RAG."
    - scenario: "The RAG document omits dual-source conflict behavior or citation shape, weakening answer traceability."
      likelihood: medium
      impact: high
      mitigation: "Require explicit sections for retrieval routing, merge rules, source_kind=note|code citations, conflict policy, freshness, and MCP/tool changes."
    - scenario: "Sensitive-data guidance is too weak for notes or future code indexing."
      likelihood: medium
      impact: high
      mitigation: "Require both documents to preserve no-secrets/no-PII/no-bulk-code guidance and state redaction is a second line of defense, not permission to store sensitive data."
  assumptions:
    - "The output language can follow the existing Chinese design-doc style unless the implementer receives a contrary instruction."
    - "The two Markdown specs are the only execution deliverables; implementation code belongs to later workstreams."
    - "Use docs/superpowers/specs as the recommended specs directory."
    - "source_kind is the user-facing citation/filter term; source_type may be mentioned only as an internal compatibility alias."
