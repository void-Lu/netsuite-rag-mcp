tldr: |
  Revised execution DAG addresses all reviewer/critic blockers: expanded RAG TDD coverage, YAML-safe frontmatter tests, safe project-directory creation, Vault no-clobber moves, verified backup/quarantine before deletion, scoped boolean validations, explicit Vault reindex before final search, and per-task size estimates.
open_questions: []
gaps: []
pre_mortem:
  overall_risk_level: high
  critical_failure_modes:
    - scenario: Vault move or project-a deletion loses data or overwrites a destination unexpectedly.
      likelihood: medium
      impact: critical
      mitigation: Create a unique timestamped backup outside the Vault with manifest, hash/size verification, no-clobber destination preflight for every move, and quarantine project-a before deletion cleanup.
    - scenario: Validation grep fails because design specs or the revised plan intentionally mention historical strings.
      likelihood: high
      impact: medium
      mitigation: Use scoped boolean assertions over operational Vault/RAG paths and explicitly exclude docs/superpowers/specs/** plus plan artifacts from historical-string checks.
    - scenario: YAML injection in title/tags/related fields creates malformed or multi-document frontmatter.
      likelihood: medium
      impact: high
      mitigation: Drive implementation with tests that parse the emitted frontmatter via yaml.safe_load and cover newline, --- marker, colon, list syntax, and anchor-like values.
    - scenario: save_obsidian_note creates directories too broadly or permits path traversal.
      likelihood: medium
      impact: high
      mitigation: Allow creation only for resolved project note directories under the Vault, validate every path component, reject empty slugs, and enforce overwrite protection.
  assumptions:
    - User already approved continuing and deletion of projects/project-a; no additional confirmation pause is needed.
    - Deletion must remain reversible through verified backup/quarantine.
    - Project note writes may create missing project/type directories, consistent with the tool purpose; domain/script_type/object_type traversal and unknown-subdir protections remain enforced.
implementation_specification:
  code_structure: |
    RAG side adds src/netsuite_rag_mcp/note_writer.py for pure, testable note-writing logic and a thin server.py wrapper. Vault side performs scoped frontmatter/template/path cleanup using preflighted file moves, then reindexes the obsidian source before final search validation.
  affected_areas:
    - f:/vscode projects folder/netsuite-rag-mcp/src/netsuite_rag_mcp/note_writer.py
    - f:/vscode projects folder/netsuite-rag-mcp/src/netsuite_rag_mcp/server.py
    - f:/vscode projects folder/netsuite-rag-mcp/tests/test_save_obsidian_note.py
    - f:/vscode projects folder/netsuite-rag-mcp/tests/test_server_tools.py
    - f:/vscode projects folder/netsuite-rag-mcp/README.md
    - d:/Obsidian Vault/homework/templates/**
    - d:/Obsidian Vault/homework/knowledge/**
    - d:/Obsidian Vault/homework/projects/**
    - d:/Obsidian Vault/homework/README.md
    - d:/Obsidian Vault/homework/Index.md
  component_details:
    - component: note_writer
      responsibility: Validate inputs, resolve safe Vault-relative paths, generate YAML frontmatter via yaml.safe_dump, redact content, write files, and optionally call index_sources for obsidian incremental indexing.
      interfaces:
        - save_obsidian_note(...)->dict[str, Any]
        - slug(title_or_filename)->str or empty_slug error
      dependencies:
        - component: redaction
          relationship: Redacts content only, preserving YAML frontmatter structure.
        - component: indexer.index_sources
          relationship: Invoked with source_names=["obsidian"] and mode="incremental" when auto_index is true.
      integration_points:
        - server.py registers MCP tool and delegates to note_writer.
        - README documents the tool contract and examples.
    - component: vault_cleanup
      responsibility: Rename frontmatter fields, move knowledge domains, migrate knowledge template, quarantine/delete project-a, and leave projects/.gitkeep.
      interfaces:
        - verified_backup_manifest.json outside the Vault
        - no_clobber_move(src,dst) stops when dst exists
      dependencies:
        - component: backup_preflight
          relationship: Cleanup/deletion depends on verified backup manifest.
      integration_points:
        - Explicit reindex via index_sources(source_names=["obsidian"], mode="full" or "incremental") after structural cleanup.
contracts:
  - from_task: T01-rag-tdd-save-note
    to_task: T03-rag-implement-save-note
