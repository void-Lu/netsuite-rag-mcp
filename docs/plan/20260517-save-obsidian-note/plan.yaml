    interface: Deletion may proceed only after backup verification covers projects/project-a and quarantine path is created.
    format: manifest entry coverage plus quarantine path outside normal Vault tree.
  - from_task: T04-vault-structure-cleanup
    to_task: T06-vault-reindex
    interface: Final Vault note/template paths and field names are stable before reindex.
    format: filesystem state under knowledge/, templates/, README.md, Index.md.
  - from_task: T05-vault-project-a-quarantine-delete
    to_task: T06-vault-reindex
    interface: projects/ contains only .gitkeep before reindex.
