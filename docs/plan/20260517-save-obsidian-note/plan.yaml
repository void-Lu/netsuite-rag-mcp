      - "RAG: pytest -q returns exit code 0."
      - "Vault old-field check: scan only active retained frontmatter/documentation targets; exclude docs/superpowers/specs/** and docs/plan/**; assert hit count == 0."
      - "Vault cross-project check: scan README.md, Index.md, templates/**, knowledge/** only; assert hit count == 0."
      - "Projects check: assert projects children exactly ['.gitkeep']."
      - "Knowledge check: assert four domain directories and four migrated notes exist; assert knowledge/cross-project and knowledge/knowledge-note.md do not exist."
      - "Search check after T06: search_netsuite_knowledge with related_objects=salesorder returns at least one migrated knowledge note."
    acceptance_criteria:
      - All validations use boolean assertions that fail the command/test on mismatch.
      - Specs themselves are not edited merely to remove historical strings.
      - Final review reports no blocking security issue for path traversal, overwrite protection, YAML injection, or backup reversibility.
    failure_modes:
      - scenario: Reviewer relies on text output inspection and misses failure.
        likelihood: medium
        impact: high
        mitigation: Require commands/tests to throw or return non-zero on false assertions.
    tech_stack: [pytest, PowerShell, Python, MCP/RAG search]
    test_coverage: Full test suite plus filesystem/index/search assertions.
    research_sources: [docs/plan/research_findings_architecture.yaml]
    requires_review: true
    review_depth: full
    review_security_sensitive: true
learnings:
  risks:
    - Scoped validation is required because specs and plan artifacts intentionally contain historical field/path strings.
    - Vault deletion can proceed without a new confirmation only if verified backup/quarantine makes it reversible.
  patterns:
    - Split RAG tool work into TDD then implementation; split Vault destructive cleanup into backup/preflight, mutation, reindex, validation.
    - For YAML frontmatter tools, test serialized output by parsing with yaml.safe_load and covering injection-like scalar values.
  user_prefs:
    - Keep Obsidian and RAG specs separate under docs/superpowers/specs/.
    - Do not create extra markdown change-summary files unless requested.
  research_used:
    - docs/plan/research_findings_architecture.yaml
    - docs/superpowers/specs/2026-05-17-save-obsidian-note-tool-design.md
    - homework/docs/superpowers/specs/2026-05-17-frontmatter-field-rename-design.md
