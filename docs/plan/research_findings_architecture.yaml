patterns_found:
  - category: architecture
    pattern: Single-source pipeline
    description: "The entire pipeline assumes only Obsidian markdown files as input: config.py → parser.py (markdown-only) → chunker.py (H2-section splitter) → indexer.py → vector_store.py. No branching for code files."
    examples:
      - file: src/netsuite_rag_mcp/parser.py
        location: "parse_markdown_file:12"
        snippet: "def parse_markdown_file(path: Path, vault_root: Path) -> SourceDocument:"
      - file: src/netsuite_rag_mcp/indexer.py
        location: "_collect_markdown_files:93"
        snippet: "for md_file in include_path.rglob('*.md'):"
    prevalence: common
  - category: naming
    pattern: "Kebab-case for CLI entry points; snake_case for Python"
    description: CLI scripts use kebab-case (netsuite-rag-mcp), Python code uses snake_case throughout
    examples:
      - file: pyproject.toml
        location: "pyproject.toml:33"
        snippet: "netsuite-rag-mcp = \"netsuite_rag_mcp.server:main\""
    prevalence: common
  - category: structure
    pattern: "Frozen dataclasses for data models"
    description: All model classes (RagConfig, SourceDocument, Chunk, SearchResult) use @dataclass(frozen=True) for immutability
    examples:
      - file: src/netsuite_rag_mcp/models.py
        location: "models.py:10-46"
        snippet: "@dataclass(frozen=True)\nclass RagConfig:"
    prevalence: common
  - category: structure
    pattern: "Protocol-based abstraction for embeddings"
    description: Embedder interface defined as Protocol class; FakeEmbedder for testing, SentenceTransformerEmbedder for production
    examples:
      - file: src/netsuite_rag_mcp/vector_store.py
        location: "vector_store.py:11-16"
        snippet: "@runtime_checkable\nclass Embedder(Protocol):"
    prevalence: common
  - category: structure
    pattern: "Manifest-based incremental indexing"
    description: "Indexer uses .rag-index/index-manifest.json with {path: {doc_id, mtime, chunk_count, indexed_at}} for incremental mode. Full mode resets everything."
    examples:
      - file: src/netsuite_rag_mcp/indexer.py
        location: "indexer.py:14"
        snippet: 'MANIFEST_PATH = ".rag-index/index-manifest.json"'
    prevalence: common
  - category: architecture
    pattern: "Post-filter approach for metadata"
    description: "Retriever over-fetches (4x top_k) then applies metadata_matches_filters in Python, rather than pushing filters to ChromaDB"
    examples:
      - file: src/netsuite_rag_mcp/retriever.py
        location: "retriever.py:17"
        snippet: "raw_results = store.query(question, n_results=max(top_k * 4, top_k))"
    prevalence: common
  - category: error_handling
    pattern: "Manifest corruption tolerant"
    description: "If manifest JSON is invalid, indexer falls back to empty manifest; if ChromaDB collection missing, it's created"
    examples:
      - file: src/netsuite_rag_mcp/indexer.py
        location: "indexer.py:48-50"
        snippet: 'except (json.JSONDecodeError, IOError):\n    manifest = {}'
    prevalence: common
  - category: testing
    pattern: "FakeEmbedder for deterministic tests"
    description: "FakeEmbedder produces 4-float vectors based on pattern counts in text (order, restlet, mapreduce, len_mod). Used in test_indexer_retriever and test_server_tools."
    examples:
      - file: src/netsuite_rag_mcp/vector_store.py
        location: "vector_store.py:30-54"
        snippet: "class FakeEmbedder:\n    def embed(self, texts: list[str]) -> list[list[float]]:"
    prevalence: common
  - category: testing
    pattern: "Write sources.yaml for each test"
    description: Tests create tmp_path vaults and write sources.yaml with "embedding_model: fake" to avoid downloading models
    examples:
      - file: tests/test_indexer_retriever.py
        location: "test_indexer_retriever.py:55-68"
        snippet: "def write_sources_config(vault: Path) -> None:"
    prevalence: common
  - category: structure
    pattern: "Chinese-language answer policy"
    description: "The answer policy is in Chinese, covering 10 rules around fidelity, citation, conflict handling, structure, uncertainty, timeliness, security, etc."
    examples:
      - file: src/netsuite_rag_mcp/policy.py
        location: "policy.py:4"
        snippet: "def build_answer_policy() -> str:"

related_architecture:
  components_relevant_to_domain:
    - component: config.py
      responsibility: "Load sources.yaml → RagConfig dataclass"
      location: src/netsuite_rag_mcp/config.py
      relationship_to_domain: "Single flat config; needs sources[] schema"
    - component: parser.py
      responsibility: "Parse markdown → SourceDocument with frontmatter"
      location: src/netsuite_rag_mcp/parser.py
      relationship_to_domain: "Markdown-only; needs SuiteScript parser"
    - component: chunker.py
      responsibility: "Split SourceDocument by H2 headings → Chunk list"
      location: src/netsuite_rag_mcp/chunker.py
      relationship_to_domain: "H2 splitting only; needs function/class-level code chunking"
    - component: metadata.py
      responsibility: "Serialize/deserialize metadata for ChromaDB; filter matching"
      location: src/netsuite_rag_mcp/metadata.py
      relationship_to_domain: "Needs source_kind, source_name, file_hash, git_commit fields"
    - component: models.py
      responsibility: "Data classes for RagConfig, SourceDocument, Chunk, SearchResult"
      location: src/netsuite_rag_mcp/models.py
      relationship_to_domain: "SourceDocument/Chunk lack source_kind, source_name, file_hash fields"
    - component: indexer.py
      responsibility: "Orchestrate full/incremental indexing; manifest management"
      location: src/netsuite_rag_mcp/indexer.py
      relationship_to_domain: "Needs multi-source routing, enhanced manifest (file_hash, git_commit)"
    - component: retriever.py
      responsibility: "Search + RAG answer assembly with redaction and policy"
      location: src/netsuite_rag_mcp/retriever.py
      relationship_to_domain: "Needs source_kind routing, conflict resolution, enhanced citation"
    - component: vector_store.py
      responsibility: "ChromaDB abstraction with Embedder Protocol"
      location: src/netsuite_rag_mcp/vector_store.py
      relationship_to_domain: "Needs multi-collection or per-source filtering support"
    - component: server.py
      responsibility: "MCP tool definitions via FastMCP"
      location: src/netsuite_rag_mcp/server.py
      relationship_to_domain: "Needs source_kind, source_name filters on tools"
