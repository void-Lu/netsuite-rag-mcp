related_technology_stack:
  languages_used_in_domain:
    - Python 3.11+
  frameworks_used_in_domain:
    - name: FastMCP (mcp>=1.2.0)
      usage_in_domain: MCP server with @mcp.tool() decorators
    - name: ChromaDB (>=0.5.23)
      usage_in_domain: Persistent vector store with cosine similarity
  libraries_used_in_domain:
    - name: SentenceTransformers (>=3.3.1)
      purpose_in_domain: BAAI/bge-m3 embedding model for semantic search
    - name: PyYAML (>=6.0.2)
      purpose_in_domain: Parse sources.yaml configuration
  external_apis_used_in_domain: []

related_conventions:
  naming_patterns_in_domain: "Snake_case for all Python code; kebab-case for CLI commands; FakeEmbedder for test doubles"
  structure_of_domain: "Flat module structure: each responsibility in its own file (config, parser, chunker, indexer, retriever, vector_store, server, metadata, redaction, policy, preload, models)"
  error_handling_in_domain: "Tolerant: missing config → defaults; corrupt manifest → empty; YAML parse failure → empty dict; ChromaDB collection missing → create"
  testing_in_domain: "pytest with tmp_path fixtures; FakeEmbedder for deterministic embedding; monkeypatch for SentenceTransformer; write_sources_config helper for vault setup"
  documentation_in_domain: "Chinese-language README and answer policy; inline docstrings on public functions"

related_dependencies:
  internal:
    - component: models.py
      relationship_to_domain: "Core data structures shared by all modules"
      direction: bidirectional
    - component: config.py
      relationship_to_domain: "Feeds RagConfig to indexer/retriever"
      direction: outbound
    - component: metadata.py
      relationship_to_domain: "Used by vector_store and retriever"
      direction: bidirectional
  external:
    - name: chromadb
      purpose_for_domain: Persistent vector storage and cosine similarity search
    - name: sentence-transformers
      purpose_for_domain: Embedding generation for semantic search
    - name: mcp
      purpose_for_domain: MCP protocol server framework (FastMCP)
    - name: PyYAML
      purpose_for_domain: Parse sources.yaml configuration

domain_security_considerations:
  sensitive_areas:
    - area: redaction.py
      location: src/netsuite_rag_mcp/redaction.py
      concern: "Regex-based PII redaction; may miss edge cases in code files (e.g., hardcoded credentials in SuiteScript)"
    - area: manifest
      location: ".rag-index/index-manifest.json"
      concern: "Currently stores mtime/doc_id; adding file_hash/git_commit increases stored data volume"
  authentication_patterns_in_domain: "None — local-only system with no authentication"
  authorization_patterns_in_domain: "None — single-user local MCP server"
  data_validation_in_domain: "YAML safe_load for config; frontmatter validated via regex; no input sanitization beyond redaction"

testing_patterns:
  framework: pytest
  coverage_areas:
    - Config loading (defaults, custom paths, missing file)
    - Markdown parsing (frontmatter, body, code fences)
    - H2 chunking (section splitting, code fence preservation)
    - Metadata round-trip (to/from ChromaDB, array fields, dates)
    - Redaction (phone, email, token, API keys)
    - Vector store (upsert, query, delete, reset)
    - Full indexing flow (FakeEmbedder)
    - MCP tool invocations (index_vault, get_index_status)
    - Preload (model download stub)
    - Templates (required fields present)
  test_organization: "One test file per module, all in tests/ directory"
  mock_patterns:
    - "FakeEmbedder: deterministic 4-float vectors based on text pattern counts"
    - "StubSentenceTransformer: monkeypatched to verify model name, cache_folder, normalize_embeddings"
    - "write_sources_config: helper to create test vault with sources.yaml"

open_questions:
  - question: "Should sources[] in sources.yaml share a single ChromaDB collection (with source_kind metadata) or use separate collections per source?"
    context: "Current design uses a single collection_name 'netsuite_notes'. Multi-source could add source_kind metadata or use separate collections."
    type: decision_blocker
    affects:
      - config.py
      - vector_store.py
      - indexer.py
      - retriever.py
  - question: "What specific SuiteScript file patterns should the code parser handle (e.g., *.js, *.ts, only SuiteScript directories)?"
    context: "Design doc says source_kind=code but doesn't specify file patterns or which SuiteScript versions."
    type: research
    affects:
      - config.py
      - parser.py
      - indexer.py
  - question: "Should the manifest track git_commit per file or per repository?"
    context: "Code sources may be in git repos. Design says git_commit for code sources but granularity is unclear."
    type: research
    affects:
      - indexer.py
  - question: "How should routing (note-led vs code-led vs mixed) determine the search strategy?"
    context: "Design mentions routing but no specifics on implementation strategy."
    type: decision_blocker
    affects:
      - retriever.py
  - question: "What conflict resolution strategy should be used when note and code sources disagree?"
    context: "Policy rule 3 mentions project-internal > generic, active > inactive, newer > older. How to automate this?"
    type: decision_blocker
    affects:
      - retriever.py
      - policy.py

gaps:
  - area: sources.yaml schema
    description: "Current flat schema (vault_root/include/exclude) cannot represent multiple sources with source_kind, source_name, file patterns, or git info. Needs sources[] array with per-source configuration."
    impact: decision_blocker
    affects:
      - config.py
      - models.py
      - indexer.py
  - area: unified metadata model
    description: "Current SourceDocument and Chunk lack source_kind, source_name, file_hash, git_commit, and code-specific fields (function_name, line_start, line_end). Metadata is purely from markdown frontmatter."
    impact: decision_blocker
    affects:
      - models.py
      - metadata.py
      - parser.py
      - chunker.py
  - area: SuiteScript parser/chunker
    description: "No code file parsing exists. Current parser.py only handles markdown with YAML frontmatter. Need a JavaScript/SuiteScript parser that can split by functions, classes, and module-level blocks."
    impact: decision_blocker
    affects:
      - parser.py
      - chunker.py
      - indexer.py
  - area: manifest enhancement
    description: "Current manifest only tracks {mtime, doc_id, chunk_count, indexed_at}. Design requires {file_hash, size, git_commit for code sources}. No hash computation exists."
    impact: research_blocker
    affects:
      - indexer.py
  - area: routing in retrieval
    description: "No concept of source_kind-aware routing. Current retriever does flat semantic search across all chunks. Design requires note-led, code-led, and mixed routing strategies."
    impact: decision_blocker
    affects:
      - retriever.py
  - area: conflict resolution
    description: "No automated conflict resolution exists. Policy rule 3 is textual guidance for the LLM. Design may require programmatic conflict detection and priority rules."
    impact: research_blocker
    affects:
      - retriever.py
      - policy.py
  - area: enhanced citation format
    description: "Current citation only has {citation_id, source_path, heading, doc_id, chunk_index, updated_at}. Design requires adding source_kind, function, line, git_commit for code chunks."
    impact: decision_blocker
    affects:
      - retriever.py
      - models.py
  - area: MCP tool filtering
    description: "Current tools filter by (project, script_type, related_objects, related_scripts, object_type, status). Design requires source_kind, source_name, project, script_id filtering. source_kind and source_name are new."
    impact: decision_blocker
    affects:
      - server.py
      - retriever.py
  - area: test coverage for new features
    description: "No tests exist for multi-source config, code parsing, file_hash, git_commit, routing, conflict resolution, or enhanced citation. All new features need test coverage."
    impact: nice_to_know
    affects:
      - tests/