      location: src/netsuite_rag_mcp/server.py:13
      usage_pattern: "@mcp.tool() registers function as MCP tool"
  data_flow_involving_domain: "sources.yaml → load_config → RagConfig → _collect_markdown_files → parse_markdown_file → SourceDocument → chunk_document → Chunk[] → ChromaVectorStore.upsert_chunks → manifest write. Retrieval: question → embed → ChromaVectorStore.query → filter → redact → SearchResult"
  key_relationships_to_domain:
