plan_id: netsuite-rag-mcp-upgrade
objective: Research current codebase architecture and identify gaps for multi-source, incremental, SuiteScript-aware RAG system
focus_area: architecture
created_at: "2026-05-15"
created_by: researcher
status: completed
tldr: |
  - Single-source Obsidian vault RAG: only markdown note indexing (no code file support)
  - Flat sources.yaml with vault_root/include/exclude (no sources[] schema)
  - Markdown-only parser using H2 splitting; no SuiteScript/JS parser
  - Metadata model limited to note frontmatter fields (type, project, script_type, script_id, etc.)
  - Incremental indexing via mtime-only manifest (no file_hash, no git_commit)
  - Citation format: simple {"citation_id", "source_path", "heading", "doc_id", "chunk_index", "updated_at"}
  - MCP tools: index_vault, search_netsuite_knowledge, ask_netsuite_rag, get_index_status — no source_kind/source_name filtering
  - Gaps: no source_kind concept, no code parsing, no manifest file_hash/git_commit, no routing, no conflict resolution

research_metadata:
  methodology: full_codebase_read (all 12 source files, 7 test files, 6 templates, pyproject.toml, sources.yaml)
  scope: complete
  confidence: high
  coverage: 100
  decision_blockers: 0
  research_blockers: 0

