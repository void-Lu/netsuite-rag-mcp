final_design_approval_prompt: |
  Please review this proposed design before implementation planning:
  - Approve the storage split: Vault = human-authored content + `rag/sources.yaml`; user data dir = Chroma + manifest + model cache.
  - Approve the resolution precedence: explicit tool argument > `NETSUITE_RAG_VAULT_ROOT` env > per-user global config; no cwd fallback for normal global MCP runtime.
  - Approve adding an init/status CLI so VS Code `mcp.json` can reference a global command without hardcoding the vault path.
  - Decide whether v1 compatibility/migration code should be removed during implementation or simply ignored for this new layout.

  If this direction looks right, the next step is to write `docs/superpowers/specs/2026-05-18-global-rag-mcp-storage-design.md`, then create a detailed implementation plan after approval.
learnings:
  risks:
    - Workspace/cwd fallback is the main root cause of global MCP misconfiguration.
    - Vault-relative `.rag-index` and `.models` pollute Obsidian and must move to user-data storage.
    - Per-vault namespace is required to avoid cross-vault Chroma/manifest contamination.
  patterns:
    - Keep `rag/sources.yaml` as source declaration, but move runtime/machine paths into a separate runtime config resolver.
    - Inject resolved Chroma/model/cache paths into existing components instead of changing ChromaVectorStore internals.
    - Use CLI init/status to avoid hardcoding vault paths in VS Code MCP config.
  user_prefs:
    - Design/spec documents should be saved under docs/superpowers/specs/ when written.
    - No backward compatibility with old vault `.rag-index` is needed for this project.
  research_used:
    - docs/plan/research_findings_architecture.yaml
    - /memories/session/netsuite-rag-mcp-exploration.md
    - /memories/repo/netsuite-rag-mcp.md
