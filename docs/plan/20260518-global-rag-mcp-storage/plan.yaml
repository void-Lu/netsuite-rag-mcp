plan_id: 20260518-global-rag-mcp-storage
objective: Redesign netsuite-rag-mcp so it can run as a globally installed MCP tool in VS Code/Copilot, not workspace-bound, with the Obsidian vault containing only human-authored knowledge and rag/sources.yaml, while Chroma, index manifest, and embedding model cache live in a local per-machine user data directory.
created_at: "2026-05-18"
created_by: gem-planner
status: pending
mode: initial
research_confidence: high
complexity: medium
plan_metrics:
  wave_1_task_count: 2
  total_dependencies: 5
  risk_score: medium
tldr: |
  Recommended design: split human knowledge from machine state. The MCP server is installed globally and starts without `${workspaceFolder}`. It resolves the vault root from an explicit MCP tool argument, then `NETSUITE_RAG_VAULT_ROOT`, then a per-user global config file. The vault root is never inferred from cwd during normal global MCP operation. The vault keeps only notes/templates plus `rag/sources.yaml`; machine-generated Chroma data, manifest, and SentenceTransformer cache move to a per-machine user data directory such as `%LOCALAPPDATA%\netsuite-rag-mcp\` on Windows. No backward compatibility with old vault `.rag-index` or `.models` is required.
open_questions:
  - question: Should the implementation keep `vault_root` as an optional per-tool override after global config exists?
    context: Keeping it is convenient for ad-hoc testing and multi-vault use, but user-facing MCP setup should not require passing it repeatedly.
    type: nice_to_know
    affects: [server, note_writer, preload, tests]
  - question: Should global config support multiple named vault profiles now or only one default vault?
    context: A single default vault is enough for current objective; profiles can be added later without changing the storage split.
    type: nice_to_know
    affects: [global_config, cli_init]
  - question: Should the global MCP command use a console script executable or `python -m netsuite_rag_mcp.server`?
    context: Console script is cleaner after package installation; `python -m` is useful in development but requires a known Python path.
    type: nice_to_know
    affects: [mcp_setup, documentation]
gaps: []
pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: The MCP server silently falls back to cwd and indexes the wrong folder when launched globally by VS Code.
      likelihood: medium
      impact: high
      mitigation: Remove cwd fallback from normal runtime resolution; return a clear missing_vault_root/missing_global_config error unless explicit arg, env, or global config resolves a vault containing `rag/sources.yaml`.
    - scenario: "`rag/sources.yaml` continues to resolve `.rag-index/chroma` or `.models` relative to the vault, causing machine state to reappear in Obsidian."
      likelihood: medium
      impact: high
      mitigation: Treat storage paths as app-state settings resolved through a new storage resolver; default all omitted/relative storage paths to user data, not vault root. Prefer omitting these paths from vault config entirely.
    - scenario: Multiple vaults share one Chroma collection/manifest and contaminate retrieval results.
      likelihood: medium
      impact: high
      mitigation: Derive a stable per-vault storage namespace from normalized vault path hash; store each vault under its own subdirectory and keep collection name stable inside that namespace.
    - scenario: Global config contains a stale vault path and tool failures are hard to diagnose.
      likelihood: medium
      impact: medium
      mitigation: "Add diagnostics to `get_index_status` and config loading errors: resolved source (`argument|env|global_config`), attempted paths, config path, storage root, and validation result."
    - scenario: Windows path handling breaks because the vault path contains spaces or MCP config shell quoting is wrong.
      likelihood: medium
      impact: medium
      mitigation: In global MCP docs prefer console script command or quoted absolute executable path; tests must cover paths with spaces and Windows-style path strings.
  assumptions:
    - No migration from old `vault/.rag-index` or `vault/.models` is required because the project was not formally used.
    - '`D:\Obsidian Vault\homework` is an example desired vault root, not a path to hardcode in `mcp.json`.'
    - Existing v2 `rag/sources.yaml` schema with `sources[]` should remain the knowledge/source declaration format.
    - Single Chroma collection plus source metadata remains acceptable; this plan changes storage location, not retrieval architecture.
implementation_specification:
  code_structure: |
    Design-only target for a later spec document: introduce a small runtime configuration layer that separates vault configuration from machine-local storage configuration.

    Proposed modules/changes for later implementation:
      src/netsuite_rag_mcp/platform_paths.py   -> cross-platform user config/data/cache path helpers
      src/netsuite_rag_mcp/runtime_config.py  -> resolve vault root, global config, and storage layout
      src/netsuite_rag_mcp/config.py          -> load vault `rag/sources.yaml` while delegating storage paths to runtime_config
      src/netsuite_rag_mcp/indexer.py         -> read/write manifest from runtime storage, not vault/.rag-index
      src/netsuite_rag_mcp/vector_store.py    -> unchanged API, but caller passes user-data Chroma path
      src/netsuite_rag_mcp/server.py          -> remove cwd fallback and expose diagnostics
      src/netsuite_rag_mcp/preload.py         -> preload model into user cache path
      src/netsuite_rag_mcp/note_writer.py     -> resolve vault through same runtime resolver and auto-index using user-data storage
      pyproject.toml                          -> add optional CLI/init entry point if approved
      README.md / future spec                 -> document global install and setup
  affected_areas:
    - src/netsuite_rag_mcp/config.py
    - src/netsuite_rag_mcp/models.py
    - src/netsuite_rag_mcp/indexer.py
    - src/netsuite_rag_mcp/server.py
    - src/netsuite_rag_mcp/preload.py
    - src/netsuite_rag_mcp/note_writer.py
    - src/netsuite_rag_mcp/vector_store.py
    - pyproject.toml
    - README.md
    - tests/test_config.py
    - tests/test_indexer_retriever.py
    - tests/test_server_tools.py
    - tests/test_preload.py
    - tests/test_save_obsidian_note.py
    - new tests for global runtime storage resolution
  component_details:
    - component: Recommended architecture
      responsibility: "Split responsibilities into three roots: global install root, human vault root, and per-machine app data root."
      interfaces:
        - Global MCP process starts from installed `netsuite-rag-mcp` console script or installed Python module.
        - Vault root contains `rag/sources.yaml`, notes, templates, and other human-authored markdown only.
        - Storage root contains Chroma, manifest, and model cache, namespaced per vault.
      dependencies:
        - component: ChromaVectorStore
          relationship: Receives resolved user-data Chroma path; no internal architecture change needed.
        - component: load_config
          relationship: Reads vault source config but no longer owns machine-storage defaults.
      integration_points:
        - VS Code User `mcp.json` can reference the globally installed command without `${workspaceFolder}`.
        - MCP tools resolve the vault consistently regardless of current VS Code workspace.
    - component: Configuration resolution design
      responsibility: Resolve vault and storage without workspace-bound assumptions.
      interfaces:
        - resolve_runtime_config(vault_root_arg: str | None = None) -> RuntimeConfig
        - global config file with `default_vault_root`, optional `storage_root`, optional `embedding_model`, optional named profiles later
        - env fallback `NETSUITE_RAG_VAULT_ROOT` for automation/development
        - optional env override `NETSUITE_RAG_USER_DATA_DIR` for tests/portable installs
      dependencies:
        - component: platform_paths
          relationship: Provides OS-specific defaults.
      integration_points:
        - server._default_vault_root replacement
        - note_writer._vault_root replacement
        - preload_embedding_model
    - component: Storage layout defaults
      responsibility: Define deterministic local storage outside the vault.
      interfaces:
        - 'Windows: `%LOCALAPPDATA%\netsuite-rag-mcp\vaults\<vault_hash>\chroma`'
        - 'Windows: `%LOCALAPPDATA%\netsuite-rag-mcp\vaults\<vault_hash>\index-manifest.json`'
        - 'Windows: `%LOCALAPPDATA%\netsuite-rag-mcp\models`'
        - 'Global config: `%APPDATA%\netsuite-rag-mcp\config.yaml`'
        - "Cross-platform config concept: platform user config dir (`~/.config/netsuite-rag-mcp/config.yaml` on Linux; `~/Library/Application Support/netsuite-rag-mcp/config.yaml` on macOS)"
        - "Cross-platform data concept: platform local/user data dir (`~/.local/share/netsuite-rag-mcp` on Linux; `~/Library/Application Support/netsuite-rag-mcp` or cache dir on macOS)"
      dependencies: []
      integration_points:
        - indexer manifest path
        - vector_store persist path
        - SentenceTransformer cache_folder
    - component: CLI/init command recommendation
      responsibility: Make global setup explicit and reproducible without hardcoding vault path in VS Code MCP config.
      interfaces:
        - "`netsuite-rag-mcp init --vault-root <path>` writes global config."
        - "`netsuite-rag-mcp status` prints resolved vault/config/storage diagnostics."
        - "`netsuite-rag-mcp preload-model` uses the same global config."
      dependencies:
        - component: runtime_config
          relationship: CLI writes/reads same config as server.
      integration_points:
        - README setup instructions
        - future MCP global install docs
